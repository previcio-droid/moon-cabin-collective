  const LOCATIONS_SEED_DATA = [{"title": "The Six Domains (plus origin and terminus)", "status": "Pulled from the core mythology's Domain structure for quick visual reference, separate from the prose write-ups.", "songs": [{"title": "The Coastal Town", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Point of origin. A place of deceptive safety \u2014 comfortable, known, but static. Must eventually be surrendered to the sea. Source songs: Tumble, Echo of a Rose. Visual cues: a quiet shoreline town under a sky of Turned Clouds, a single figure (Elizabeth) watching the horizon, the sea as both comfort and eventual departure point.", "tags": ["Domain"]}, {"title": "The High Peaks / The Ridge", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Spiritual North. Where the air thins and Seekers learn to vibrate with the world's pulse instead of resisting it \u2014 the staging ground for the pilgrimage and the place Moon Cabin is rooted. Source songs: Tumble, Travelers, The Old Man's Boat. Home to Elmeg the Wise, Coordinate 726, Previcio & Moon Cabin, Jive I, and the Dragon's summit. Visual cues: thin, bright mountain air, an ancient bark-carved figure (Elmeg) at a tree-line, paperwood textures, a sense of expansion and altitude.", "tags": ["Domain"]}, {"title": "Wysteria Lane & The Wildlands", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "The Shadow Realm / Primal Sector. A psychological thicket where media-static threatens to drown the soul's own rhythm \u2014 organic distortion before mechanical distortion. Source songs: Spirit Of The Dark Horse, Dr. Darkness, Mr. Action. Home to Dr. Darkness, the Yeti, the Iguana & His Brother, the Labyrinth, Barnaby, and the Moon Cabin companions. Visual cues: neon static bleeding into natural forest textures, distorted scan-line light through trees, a sense of the organic curdling into the uncanny.", "tags": ["Domain"]}, {"title": "The Dripfield", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "The Liquid Desert, crucible of ego-death. Intense spiritual heat where ego is meant to melt rather than harden. Source songs: Madhuvan, ties to the Dhruva narrative. Home to Madhuvan, the Hot Tea/Butter Rum ritual, and Royal & Madalena's longing across the Cosmic Barrier. Visual cues: rippling heat-haze over molten-looking dunes, a lone wanderer crossing an endless horizon, ground that shimmers between solid and liquid.", "tags": ["Domain"]}, {"title": "The Organos Grid / Big Modern", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "The hyper-digital metropolis. Where the organic finally gives way fully to the mechanical \u2014 synthetic, rigid, and the place where Previcio is most at risk given his partially cybernetic nature. Source songs: Silver Rising. Home to the Empress of Organos and the Silver Rising transfiguration. Contains the Uncanny Valley sub-region. Visual cues: cold brass and obsidian architecture, motherboard-circuitry textures sprawled like a city grid, a static hum underlying everything.", "tags": ["Domain"]}, {"title": "Rockdale", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "The Eternal City, resolution and new beginning. The final Domain, where the static of the Grid and the roar of the Wildlands fade into shimmering silence. Source songs: Everything Must Go. Home to the Final Law, the Red Bird's flight, and Royal & Madalena's reunion. Visual cues: shimmering quiet light, a city that feels more like a held breath than a place, the absence of static or distortion for the first time in the journey.", "tags": ["Domain"]}]}, {"title": "Named Waypoints & Sub-Locations", "status": "Smaller named places that sit within or between the six Domains \u2014 confirmed in the core mythology and Bestiary sources.", "songs": [{"title": "The Cosmic Barrier", "originalArtist": "Song-rooted (Royal & Madalena)", "debut": "", "timesPlayed": "", "notes": "Where the sky meets the road \u2014 the divide separating Royal and Madalena, two soulmates calling to each other across distance. Thins only at the peak of the Dripfield's ritual heat, vanishes entirely at Rockdale. Visual cues: a visible seam in the sky where cloud-realm meets an unpaved road rising into the atmosphere, voices traveling as acoustic echo rather than sound across physical space.", "tags": ["Waypoint"]}, {"title": "The Uncanny Valley", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "The Empress of Organos's domain within the Organos Grid \u2014 an \"em dash oasis,\" a pause that never ends, where identity dilutes through hyper-connectivity (sometimes called the \"Digital Sauce\" in source material). Visual cues: an endless waiting-room atmosphere, identity-blurring static, a pause rendered as physical architecture.", "tags": ["Waypoint"]}, {"title": "Lovering's Hollow", "originalArtist": "Hybrid", "debut": "", "timesPlayed": "", "notes": "Where Barnaby strayed from the path on a night ruled by the Beaver Moon, encountering a Phantom Willow bleeding violet sap. Now substantially confirmed by Goose's own Goosemas XII narrative as the real location where Barnaby Glimpse was lost in the 1730s. Visual cues: a cold, still hollow with a pale moon overhead and frost on the ground, a single willow weeping faint violet light.", "tags": ["Waypoint"]}, {"title": "Robinson's Lot", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "A named waypoint near Lovering's Hollow, part of the Road Sign System's visual planning. Visual cues: not yet developed beyond its name and proximity to Lovering's Hollow \u2014 open for future detail.", "tags": ["Waypoint"]}, {"title": "The Celestial Coordinate: 726", "originalArtist": "Hybrid", "debut": "", "timesPlayed": "", "notes": "A Temporal Rift / internal Lighthouse at the Ridge, tied to July 26th, the day the barrier between worlds is said to be thinnest. Where Seekers look for the Diamond Eye. Visual cues: a lit-lamp quality held against summer haze, a sense of stabilizing \"cold water\" clarity even at the pilgrimage's furthest point.", "tags": ["Waypoint"]}]}, {"title": "The Road Sign System \u2014 Visual Waypoints", "status": "Confirmed art-direction reference from the core mythology, Section: The Road Sign System.", "songs": [{"title": "Wysteria Lane (sign)", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Entrance sign to the Shadow Realm. Open question whether each sign gets its own visual language (hand-painted wood for organic Domains vs. stamped metal/LED for Organos) or whether consistency across signs matters more.", "tags": ["Road Sign"]}, {"title": "Dripfield (sign)", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Entrance sign to the Liquid Desert.", "tags": ["Road Sign"]}, {"title": "Organos (sign)", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Entrance sign to the Grid.", "tags": ["Road Sign"]}, {"title": "Rockdale (sign)", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Entrance sign to the terminus.", "tags": ["Road Sign"]}, {"title": "\"Everything Must Go\" (sign)", "originalArtist": "Song-rooted", "debut": "", "timesPlayed": "", "notes": "Not a place-sign but a resolution marker \u2014 appears only once a Seeker has actually shed what they were carrying, distinct from the directional signs.", "tags": ["Road Sign"]}]}];
  const RITUALS_SEED_DATA = [{"title": "Core Teachings & Rules", "status": "The Gooseverse's governing philosophies \u2014 pulled from Elmeg's teaching and the Labyrinth's internal laws, kept distinct from each other per the core mythology.", "songs": [{"title": "The Ritual of the Tumble", "originalArtist": "Hybrid", "debut": "", "timesPlayed": "", "notes": "Elmeg the Wise's core teaching at the Ridge: losing your balance on purpose rather than walking a fixed path. Three steps: the Heavy Past (standing at the edge, carrying fixed identity), Controlled Surrender (releasing the grip on certainty), and Shifting Rhythms (landing seamlessly, becoming unpredictable and immune to traps). A choice offered, not a rule imposed. Visual cues: a figure deliberately losing footing at a cliff's edge, the moment of fall rendered as graceful rather than accidental, landing into a new rhythm rather than a crash.", "tags": ["Teaching"]}, {"title": "The Three Laws of the Labyrinth", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "The Labyrinth's own internal logic, distinct from Elmeg's offered choice and the Empress's imposed control \u2014 the Labyrinth simply will not stop moving and demands the Seeker keep pace. Law of the Tumble (every ending is a new beginning; stand still and be consumed), Law of the Drip (identity must be liquefied to survive the Dripfield's heat), Law of the Frequency (rhythm is the only objective truth; the groove is the only escape from the Uncanny Valley). Visual cues: corridors that enforce motion on anyone inside them, walls that close in on stillness, a maze that behaves like a living metronome.", "tags": ["Law"]}, {"title": "Shifting Rhythms / Jive I (the technique)", "originalArtist": "Song-rooted", "debut": "", "timesPlayed": "135", "notes": "Where Shifting Rhythms is the philosophy taught at the Ridge, Jive I is the technique that philosophy becomes under pressure \u2014 a shifting, unpredictable tempo that disrupts the Empress of Organos's Synthetic Loops. Not a character but a learned ability, the Ridge's combat-and-survival counterpart to the Tumble's spiritual lesson. Visual cues: a figure whose movement refuses to settle into any fixed beat, static visibly rusting and failing around them as they keep changing rhythm.", "tags": ["Technique"]}]}, {"title": "Rituals & Transformative States", "status": "Confirmed practices and altered states from the Dripfield and Ridge sections of the core mythology.", "songs": [{"title": "Hot Tea and Butter Rum (The Ritual)", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "The alchemical lubricants of the Dripfield, credited in-universe to the \"Night Rays\" band \u2014 consumed to vibrate the spirit between human, beast, and spirit states, stripping away physical history and easing the Seeker toward transformation. Visual cues: two steaming vessels passed around a low fire, steam curling in deliberate, unnatural spirals, a faint shimmer suggesting more than a simple drink.", "tags": ["Ritual"]}, {"title": "The Diamond Eye (state)", "originalArtist": "Hybrid", "debut": "", "timesPlayed": "", "notes": "A state of internal clarity and wholeness found at Coordinate 726, held out like a lit lamp \u2014 lets a Seeker see through Wysteria Lane's distortions and denies Dr. Darkness and the Yeti their foothold. Stabilizes in \"cold water,\" never too far from home even at the pilgrimage's furthest point. Visual cues: a steady inner light visible through a figure's silhouette, distortion and static visibly failing to take hold near them.", "tags": ["State"]}, {"title": "Moon Cabin's Glow (earned stillness)", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Earned through artistic creation and meditation \u2014 a deliberate quieting of inner noise, not constant or automatic. When present, denies the Empress and Dr. Darkness their foothold and lets Previcio manifest psychedelic objects and wares. When it fades, the Silver Rising takes hold. Visual cues: a soft interior glow that brightens with stillness and dims with noise, almost like a lantern keeping time with a person's inner state.", "tags": ["State"]}, {"title": "Silver Rising (the transfiguration mechanic)", "originalArtist": "Song-rooted", "debut": "2022-02-02", "timesPlayed": "66", "notes": "Not merely a lunar phase but a cosmic trigger for biological crisis \u2014 the \"Who am I?\" psychological struggle becomes physically real, with humans dissolving into Humanoid Beasts. The progression: human form \u2192 biological crisis \u2192 primal beast form. Those who hold the Diamond Eye or Moon Cabin's glow resist full transfiguration. Visual cues: a figure mid-transformation under full moonlight, silver-blue light catching fur or fangs emerging rather than warm tones.", "tags": ["Mechanic"]}]}, {"title": "The Ambition Trap & Closing Mechanics", "status": "The Dragon's mechanic and the Final Law, confirmed in the core mythology's closing sections.", "songs": [{"title": "The Dragon's Chain Mechanic", "originalArtist": "Song-rooted", "debut": "", "timesPlayed": "", "notes": "The moment a Seeker attempts to possess or chain the Dragon's mirror-scaled vision, the scales become heavy iron chains \u2014 ambition becomes a literal, dragging weight that follows the Seeker through every Domain. The only resolution is surrender, not victory; letting the desire to \"own\" the vision go is what makes the Silver Rising fade and the Red Bird take flight. Visual cues: mirror-scales hardening into chain-links in real time, a Seeker visibly burdened and slowed by something they're still gripping.", "tags": ["Mechanic"]}, {"title": "The Final Law: Everything Must Go", "originalArtist": "Song-rooted", "debut": "", "timesPlayed": "", "notes": "To enter Rockdale, Travelers must shed everything: primal beast-skins from the Silver Rising, digital echoes from the Organos Grid, and the Dragon's dragging chains. Peace is found in releasing the road itself, not at the end of it. Visual cues: a figure stepping through a final threshold visibly lighter, beast-skins and chains falling away mid-step rather than being carried through.", "tags": ["Law"]}]}];
  const ARTIFACTS_SEED_DATA = [{"title": "Manifested Objects & Wares", "status": "Objects directly tied to Previcio's Moon Cabin mechanic \u2014 the in-universe origin point for actual Moon Cabin Collective merchandise.", "songs": [{"title": "Psychedelic Objects & Wares (Moon Cabin manifestations)", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Physical residue of Previcio's centered stillness, made visible. This is the in-universe origin point for the Moon Cabin Collective's actual artwork \u2014 tees, prints, and stickers can be framed as artifacts pulled directly out of a Moon Cabin state. Visual cues: objects with a faint, lingering glow as if still cooling from the moment they were manifested, patterns that echo the same psychedelic visual language as Previcio himself (neon-blue vectors thawing into lavender ripples).", "tags": ["Artifact"]}, {"title": "The Hot Tea & Butter Rum Vessels", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "The physical containers for the Dripfield ritual drink \u2014 a teacup and a small dark bottle, passed between Travelers around a low fire. Visual cues: simple, worn vessels with a faint shimmer in the liquid itself, steam that curls in unnaturally deliberate spirals.", "tags": ["Artifact"]}]}, {"title": "Burdens & Weapons", "status": "Objects tied to the Dragon's ambition mechanic and the Ridge's combat technique \u2014 things characters carry, wield, or are weighed down by.", "songs": [{"title": "The Dragon's Chains", "originalArtist": "Song-rooted", "debut": "", "timesPlayed": "", "notes": "What the Dragon's mirror-scales become the moment a Seeker tries to possess or own the vision it offers \u2014 heavy iron chains that drag through every subsequent Domain until released. Visual cues: chain-links with a faint mirror-sheen still visible on their surface, as if the scales never fully forgot what they used to be.", "tags": ["Object"]}, {"title": "Jive I (as   function currentView() { return VIEWS[state.view]; }

  function cardKey(sectionIdx, songIdx) { return sectionIdx + ':' + songIdx; }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function tagClass(tag) {
    return 't-' + tag.toLowerCase().replace(/[^a-z]+/g, '-').replace(/^-|-$/g, '');
  }

  async function loadState() {
    const view = currentView();
    try {
      const stored = await window.storage.get(view.storageKey, false);
      if (stored && stored.value) {
        state.sections = JSON.parse(stored.value);
        return;
      }
    } catch (e) { /* not found, fall through to seed */ }
    state.sections = view.seed;
  }

  async function persist() {
    const view = currentView();
    try {
      await window.storage.set(view.storageKey, JSON.stringify(state.sections), false);
      return true;
    } catch (e) {
      console.error('Storage error', e);
      return false;
    }
  }

  async function switchView(viewKey) {
    if (state.view === viewKey) return;
    state.view = viewKey;
    state.activeTag = null;
    state.query = '';
    state.openCards = new Set();
    await loadState();
    render();
  }

  function allTagsPresent() {
    const set = new Set();
    state.sections.forEach(s => s.songs.forEach(song => (song.tags||[]).forEach(t => set.add(t))));
    return currentView().tagOrder.filter(t => set.has(t));
  }

  function matchesQuery(song, q) {
    if (!q) return true;
    const hay = (song.title + ' ' + song.notes + ' ' + (song.originalArtist||'')).toLowerCase();
    return hay.includes(q.toLowerCase());
  }

  function matchesTag(song, tag) {
    if (!tag) return true;
    return (song.tags||[]).includes(tag);
  }

    return state.sections.reduce((sum, s) => sum + s.songs.length, 0);

        <div class="gv-stats-row">
          <div class="gv-stat"><span class="gv-stat-num">${total}</span><span class="gv-stat-label">Entries Logged</span></div>
          <div class="gv-stat"><span class="gv-stat-num">${state.sections.length}</span><span class="gv-stat-label">Sections</span></div>
          <div class="gv-stat"><span class="gv-stat-num">${tags.length}</span><span class="gv-stat-label">Tag Types</span></div>
        </div>
        <div class="gv-view-tabs">
          ${Object.keys(VIEWS).map(key => `<button class="gv-view-tab ${state.view === key ? 'active' : ''}" data-view="${key}">${escapeHtml(VIEWS[key].label)}</button>`).join('')}
        </div>
      </header>
      <div class="gv-toolbar">
        <input class="gv-search" type="text" placeholder="Search titles, themes, characters..." value="${escapeHtml(state.query)}" />
        <button class="gv-tag-filter ${!state.activeTag ? 'active' : ''}" data-tag="">All</button>
        ${tags.map(t => `<button class="gv-tag-filter ${state.activeTag === t ? 'active' : ''}" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</button>`).join('')}
      </div>
      <div class="gv-body">
    `;

    let anyVisible = false;

    state.sections.forEach((section, sIdx) => {
      const visibleSongs = section.songs
        .map((song, origIdx) => ({ song, origIdx }))
        .filter(({song}) => matchesQuery(song, state.query) && matchesTag(song, state.activeTag));

      if (visibleSongs.length === 0) return;
      anyVisible = true;

      html += `
        <div class="gv-section-head">
          <h2 class="gv-section-title gv-display">${escapeHtml(section.title)}</h2>
          <span class="gv-section-count gv-mono">${visibleSongs.length} of ${section.songs.length}</span>
        </div>
      `;

      visibleSongs.forEach(({song, origIdx}) => {
        const key = cardKey(sIdx, origIdx);
        const isOpen = state.openCards.has(key);
        const primaryTag = (song.tags && song.tags[0]) || 'Documented';
        const metaParts = [];
        if (song.originalArtist && song.originalArtist !== 'Goose') metaParts.push(escapeHtml(song.originalArtist));
        if (song.debut) metaParts.push(escapeHtml(song.debut));
        if (song.timesPlayed) metaParts.push(`${escapeHtml(song.timesPlayed)}× played`);

        html += `
          <div class="gv-card ${isOpen ? 'open' : ''}" data-key="${key}" data-primary-tag="${escapeHtml(primaryTag)}">
            <div class="gv-card-head" data-toggle="${key}" tabindex="0" role="button" aria-expanded="${isOpen}">
              <span class="gv-chevron">▶</span>
              <span class="gv-card-title gv-display">${escapeHtml(song.title)}</span>
              ${(song.tags||[]).slice(0,2).map(t => `<span class="gv-tagpill ${tagClass(t)}">${escapeHtml(t)}</span>`).join('')}
              <span class="gv-card-meta">${metaParts.join(' · ')}</span>
            </div>
            <div class="gv-card-body">
              <div class="gv-notes" data-notes-key="${key}" spellcheck="false">${escapeHtml(song.notes)}</div>
            </div>
          </div>
        `;
      });
    });

    if (!anyVisible) {
      html += `<div class="gv-empty">No entries match "${escapeHtml(state.query)}"${state.activeTag ? ' tagged ' + escapeHtml(state.activeTag) : ''}.</div>`;
    }

    html += `
      </div>
      <p class="gv-footer-note">This is a read-only reference. All thematic descriptions are paraphrased for use as art-direction reference only. No song lyrics are stored or displayed here.</p>
    `;

    root.innerHTML = html;
    attachHandlers();
  }

  function attachHandlers() {
    const root = document.getElementById('gooseverse-root');

    root.querySelectorAll('.gv-view-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        switchView(btn.getAttribute('data-view'));
      });
    });

    const searchInput = root.querySelector('.gv-search');
    searchInput.addEventListener('input', (e) => {
      state.query = e.target.value;
      const cursorPos = e.target.selectionStart;
      render();
      const newInput = root.querySelector('.gv-search');
      newInput.focus();
      newInput.setSelectionRange(cursorPos, cursorPos);
    });

    root.querySelectorAll('.gv-tag-filter').forEach(btn => {
      btn.addEventListener('click', () => {
        const tag = btn.getAttribute('data-tag');
        state.activeTag = tag || null;
        render();
      });
    });

    root.querySelectorAll('[data-toggle]').forEach(el => {
      const toggle = () => {
        const key = el.getAttribute('data-toggle');
        if (state.openCards.has(key)) state.openCards.delete(key);
        else state.openCards.add(key);
        render();
      };
      el.addEventListener('click', toggle);
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
      });
    });

    // Event listeners for adding, editing, and deleting entries removed for read-only mode
  }

  async function init() {
    const root = document.getElementById('gooseverse-root');
    root.innerHTML = '<div style="padding:60px;text-align:center;font-family:JetBrains Mono, monospace;color:#6B4226;">Loading the codex…</div>';
    await loadState();
    render();
  }

  init();
})();
</script>
