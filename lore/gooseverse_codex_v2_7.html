<div id="gooseverse-root"></div>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

#gooseverse-root {
  --ink: #0F0E0C;
  --paper: #F2EDE1;
  --paper-dim: #E8E1D2;
  --brass: #C9A227;
  --leather: #6B4226;
  --moss: #3A5A4A;
  --oxblood: #8B2E2E;
  --line: rgba(15,14,12,0.14);
  font-family: 'Source Sans 3', sans-serif;
  color: var(--ink);
  background: var(--paper);
  min-height: 100vh;
  position: relative;
}
#gooseverse-root * { box-sizing: border-box; }
#gooseverse-root .gv-display { font-family: 'Fraunces', serif; }
#gooseverse-root .gv-mono { font-family: 'JetBrains Mono', monospace; }

#gooseverse-root .gv-texture {
  position: absolute; inset: 0; pointer-events: none; opacity: 0.5;
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(201,162,39,0.06), transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(58,90,74,0.05), transparent 50%);
}

#gooseverse-root .gv-header {
  padding: 48px 28px 28px;
  border-bottom: 2px solid var(--ink);
  position: relative;
}
#gooseverse-root .gv-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--leather);
  margin-bottom: 10px;
}
#gooseverse-root .gv-title {
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 600;
  line-height: 1.02;
  letter-spacing: -0.01em;
  margin: 0 0 6px;
}
#gooseverse-root .gv-title em {
  font-style: italic;
  color: var(--oxblood);
  font-weight: 500;
}
#gooseverse-root .gv-subtitle {
  font-size: 15px;
  max-width: 640px;
  line-height: 1.5;
  color: rgba(15,14,12,0.72);
  margin: 0;
}
#gooseverse-root .gv-stats-row {
  display: flex;
  gap: 28px;
  margin-top: 22px;
  flex-wrap: wrap;
}
#gooseverse-root .gv-stat {
  font-family: 'JetBrains Mono', monospace;
}
#gooseverse-root .gv-stat-num {
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  display: block;
}
#gooseverse-root .gv-stat-label {
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--leather);
}

#gooseverse-root .gv-view-tabs {
  display: flex;
  gap: 8px;
  margin-top: 26px;
  flex-wrap: wrap;
}
#gooseverse-root .gv-view-tab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.04em;
  padding: 10px 18px;
  border: 1.5px solid var(--ink);
  border-bottom: none;
  border-radius: 6px 6px 0 0;
  background: var(--paper-dim);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
  top: 2px;
}
#gooseverse-root .gv-view-tab:hover { background: rgba(201,162,39,0.18); }
#gooseverse-root .gv-view-tab.active {
  background: var(--ink);
  color: var(--paper);
  top: 0;
}
#gooseverse-root .gv-view-tab:focus-visible {
  outline: 2px solid var(--brass);
  outline-offset: 2px;
}

#gooseverse-root .gv-toolbar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--paper);
  border-bottom: 1px solid var(--line);
  padding: 14px 28px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
#gooseverse-root .gv-search {
  flex: 1;
  min-width: 200px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  padding: 10px 14px;
  border: 1.5px solid var(--ink);
  border-radius: 3px;
  background: white;
  color: var(--ink);
}
#gooseverse-root .gv-search:focus {
  outline: 2px solid var(--brass);
  outline-offset: 1px;
}
#gooseverse-root .gv-search::placeholder { color: rgba(15,14,12,0.4); }

#gooseverse-root .gv-tag-filter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.03em;
  padding: 7px 12px;
  border: 1.5px solid var(--ink);
  border-radius: 20px;
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}
#gooseverse-root .gv-tag-filter:hover { background: rgba(15,14,12,0.06); }
#gooseverse-root .gv-tag-filter.active {
  background: var(--ink);
  color: var(--paper);
}
#gooseverse-root .gv-tag-filter:focus-visible {
  outline: 2px solid var(--brass);
  outline-offset: 2px;
}


#gooseverse-root .gv-body { padding: 24px 28px 80px; max-width: 920px; margin: 0 auto; }

#gooseverse-root .gv-section-head {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin: 40px 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
}
#gooseverse-root .gv-section-head:first-child { margin-top: 0; }
#gooseverse-root .gv-section-title {
  font-size: 21px;
  font-weight: 600;
  margin: 0;
}
#gooseverse-root .gv-section-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--leather);
}

#gooseverse-root .gv-card {
  border: 1px solid var(--line);
  border-left: 3px solid var(--brass);
  background: rgba(255,255,255,0.4);
  border-radius: 2px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-left-color 0.15s ease;
}
#gooseverse-root .gv-card[data-primary-tag="Character"] { border-left-color: var(--oxblood); }
#gooseverse-root .gv-card[data-primary-tag="Creature/Myth"] { border-left-color: var(--moss); }
#gooseverse-root .gv-card[data-primary-tag="Instrumental"] { border-left-color: var(--leather); }
#gooseverse-root .gv-card[data-primary-tag="Sparse"] { border-left-color: rgba(15,14,12,0.25); }
#gooseverse-root .gv-card[data-primary-tag="Thin"] { border-left-color: rgba(15,14,12,0.25); }

#gooseverse-root .gv-card-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  cursor: pointer;
  user-select: none;
}
#gooseverse-root .gv-card-head:focus-visible { outline: 2px solid var(--brass); outline-offset: -2px; }
#gooseverse-root .gv-card-title {
  font-family: 'Fraunces', serif;
  font-size: 16.5px;
  font-weight: 600;
  flex: 1;
  min-width: 140px;
}
#gooseverse-root .gv-card-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: rgba(15,14,12,0.55);
  white-space: nowrap;
}
#gooseverse-root .gv-tagpill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 10px;
  background: rgba(15,14,12,0.08);
  color: var(--ink);
  white-space: nowrap;
}
#gooseverse-root .gv-tagpill.t-character { background: rgba(139,46,46,0.14); color: var(--oxblood); }
#gooseverse-root .gv-tagpill.t-creature-myth { background: rgba(58,90,74,0.14); color: var(--moss); }
#gooseverse-root .gv-tagpill.t-instrumental { background: rgba(107,66,38,0.14); color: var(--leather); }
#gooseverse-root .gv-tagpill.t-pre-goose-origin { background: rgba(201,162,39,0.18); color: #8a6c1a; }
#gooseverse-root .gv-tagpill.t-mythological-growth { background: rgba(58,90,74,0.14); color: var(--moss); }
#gooseverse-root .gv-tagpill.t-song-rooted { background: rgba(139,46,46,0.14); color: var(--oxblood); }
#gooseverse-root .gv-tagpill.t-hybrid { background: rgba(201,162,39,0.18); color: #8a6c1a; }
#gooseverse-root .gv-tagpill.t-divergent { background: rgba(107,66,38,0.14); color: var(--leather); }
#gooseverse-root .gv-tagpill.t-keeper-of-the-hearth { background: rgba(201,162,39,0.22); color: #8a6c1a; }
#gooseverse-root .gv-tagpill.t-unresolved-naming { background: rgba(15,14,12,0.10); color: var(--ink); border: 1px dashed rgba(15,14,12,0.3); }
#gooseverse-root .gv-tagpill.t-open-slot { background: rgba(15,14,12,0.06); color: rgba(15,14,12,0.5); border: 1px dashed rgba(15,14,12,0.25); }
#gooseverse-root .gv-tagpill.t-unresolved { background: rgba(139,46,46,0.08); color: var(--oxblood); border: 1px dashed rgba(139,46,46,0.35); }

#gooseverse-root .gv-chevron {
  font-size: 12px;
  color: var(--leather);
  transition: transform 0.18s ease;
  flex-shrink: 0;
}
#gooseverse-root .gv-card.open .gv-chevron { transform: rotate(90deg); }

#gooseverse-root .gv-card-body {
  display: none;
  padding: 0 16px 18px;
  border-top: 1px solid var(--line);
}
#gooseverse-root .gv-card.open .gv-card-body { display: block; }
#gooseverse-root .gv-notes {
  font-size: 14.5px;
  line-height: 1.6;
  color: rgba(15,14,12,0.85);
  margin: 14px 0 12px;
  white-space: pre-wrap;
}

#gooseverse-root .gv-empty {
  text-align: center;
  padding: 60px 20px;
  color: rgba(15,14,12,0.45);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}

#gooseverse-root .gv-footer-note {
  max-width: 920px;
  margin: 40px auto 0;
  padding: 0 28px 60px;
  font-size: 12.5px;
  line-height: 1.6;
  color: rgba(15,14,12,0.5);
  font-style: italic;
}

@media (max-width: 600px) {
  #gooseverse-root .gv-header { padding: 32px 18px 22px; }
  #gooseverse-root .gv-toolbar { padding: 12px 18px; }
  #gooseverse-root .gv-body { padding: 20px 18px 60px; }
  #gooseverse-root .gv-card-title { font-size: 15px; }
}

@media (prefers-reduced-motion: reduce) {
  #gooseverse-root * { transition: none !important; }
}

<script>
(function() {
  const SEED_DATA = [{"title": "Part 2: Q\u2013Z (Originals)", "status": "Complete. Note: \"Yeti\" is credited to Great Blue (Peter Anspach's pre-Goose project), not Goose proper \u2014 included here for Gooseverse relevance but flagged as a different artist credit.", "songs": [{"title": "Red Bird", "originalArtist": "Goose", "debut": "2022-01-29", "timesPlayed": "55", "notes": "Written by Peter Anspach, off Everything Must Go (2025), debuted January 2022. Inspired by his mother Rita, a singer and music educator \u2014 earlier verses draw on childhood memories of her as a source of serenity and protection, using her love of music and storytelling as a guide. Rita has described first hearing the song over the phone, just voice and acoustic guitar, finding it deeply moving. Album-level framing places it among the record's recurring \"unlikely avatar\" songs \u2014 following \"Animal\" (an inner jungle), \"Red Bird\" reframes that same internal space as a cathedral. Lyrically follows a wounded, weary bird-figure who has flown out of hardship, carrying old stories and hurts, being gently urged not to give up \u2014 to keep singing and flying toward the light despite exhaustion and past mistakes. Visual cues: a red bird with frayed or healing wings emerging from a storm into soft daylight, a maternal presence as a guiding light or beacon, a long coat patterned with faint imagery of the bird's past stories, a cathedral-like interior as inner sanctuary. The Gooseverse's clearest maternal/protective love entry \u2014 distinct from Lead the Way's grief and Life On The Shelf's abandonment; tender and hopeful rather than wounded.", "tags": ["Documented"]}, {"title": "Rosewood Heart", "originalArtist": "Goose", "debut": "2015-02-20", "timesPlayed": "64", "notes": "Written by Rick Mitarotonda, off Moon Cabin (2016). One of Goose's most-jammed live songs (Notable Jam 23 times). Explores nostalgia, loss, resilience, and the passage of time \u2014 opening on a still natural scene that awakens quiet realization, moving into mourning for lost dreams and fleeting past happiness. A buried, half-forgotten treasure deep in caverns stands in for something valuable lost to time, paired with a longing to recover earlier, simpler joy. The emotional anchor is a repeated plea to hope \u2014 to keep waiting, to keep a horizon lit even when resolution isn't yet at hand \u2014 closing on persistence despite changing winds and fast-moving storm clouds. Visual cues: white oak and rosewood trees over still green ground, a buried trove deep in stone caverns waiting to be rediscovered, red clay walls holding ancient memory, a horizon kept deliberately lit against an oncoming storm, golden wide-eyed innocence glimpsed like a distant memory. The Gooseverse's clearest \"buried hope\" piece \u2014 contrasts Indian River's acceptance of loss by insisting on persistence and recovery instead.", "tags": ["Documented"]}, {"title": "Royal", "originalArtist": "Goose", "debut": "2025-08-15", "timesPlayed": "2", "notes": "Brand new, 2025. Lead single off Chain Yer Dragon, written by Rick Mitarotonda & Matt Campbell, produced by D. James Goodwin. Per the band's press release, explicitly introduces \"the story of Royal, a transient musician whose burning ambition threatens to get the best of him\" \u2014 a deliberate character-introduction song. Royal is a wandering, old-school musician chasing something just out of reach (a faded rhythm, an old song, a dream that's always run ahead of him), urged to slow down before burning out since his driving fire can't sustain itself forever. Also a charming, somewhat untrustworthy showman \u2014 restless, perpetually tangled in his own chaotic momentum, always back on the road no matter how worn down. Visual cues: a roving musician-trickster figure, weathered and charismatic, perpetually mid-performance or mid-departure, fire/oil imagery for unsustainable ambition, dusty roadhouses and old foundations as habitual backdrop, a figure who can never stay still long enough to be saved from himself. Given the band's explicit \"story of Royal\" framing, this is a flagship character-introduction song \u2014 strong candidate as a recurring traveling performer or cautionary figure across the Act I\u2013V world-building.", "tags": ["Character"]}, {"title": "SALT", "originalArtist": "Goose", "debut": "2024-04-07", "timesPlayed": "16", "notes": "Written by Rick Mitarotonda & Peter Anspach. No interview on specific meaning found. Lyrically confronts someone confident they fully understand a situation, with the narrator pulling back a veil to expose something unseen; pairs this with a grounded, working-class image of someone keeping their head down and grinding through tasks methodically. Closes on a sensory outdoor image \u2014 open air, salt, wind \u2014 paired with a sense that the road ahead requires real struggle to find a way forward. Visual cues: a curtain or blindfold pulled back to reveal hidden truth, a figure working quietly close to the ground, methodical and unshowy, then a shift outward into open coastal air \u2014 salt-laced wind, a horizon promising an unfound future, the implication of a hard physical journey ahead. A grounded, weathered piece \u2014 a coastal/elemental counterpart to the desert imagery in Madhuvan and Atlas Dogs.", "tags": ["Documented"]}, {"title": "Same Old Shenanigans", "originalArtist": "Goose", "debut": "2016-03-19", "timesPlayed": "58", "notes": "Also known as \"S.O.S.\" Written by Rick Mitarotonda, off Shenanigans Nite Club (2021), debuted 2018. An ode to a now-defunct Connecticut night club, also the inspiration for the album's title. Within the album's larger arc, framed as a warning about the perils and false idols that draw attention away from higher awareness \u2014 getting comfortable and stuck rather than seeking growth. Depicts a hazy, repetitive night-life scene: stale thoughts going cold over drinks, lantern-lit chatter that may or may not be sincere, a \"free man\" wandering into a rough area the nightlife crowd doesn't reach, dancing and noise filling a hot room while everyone avoids anything real \u2014 closing with dawn finally breaking through the haze. Visual cues: a glowing, hazy nightclub interior with lantern light spilling onto blurred faces, a lone wanderer drifting past the club into quieter \"badlands\" beyond its reach, bottles and cans scattered cold on a counter, dawn breaking through smoke-stained windows as the first sign of clarity. Pairs with Madhuvan as the album's more grounded, cautionary counterpart to spiritual searching.", "tags": ["Documented"]}, {"title": "Seekers on the Ridge pt I", "originalArtist": "Goose", "debut": "2020-11-07", "timesPlayed": "52", "notes": "Written by Rick Mitarotonda, debuted 2020, almost always paired live with Part II. No interview found; follows a hunter/tracker figure in a snowy mountain setting pursuing a beast that always slips away into the hills. Harsh terrain \u2014 frozen moss, forgotten stones, a pile of bones beside a river \u2014 with a recurring sense of fate twisting beyond control. Despite a long winter, he resolves to keep going, accepting his place in the pursuit, closing on an image of returning to the elusive creature once conditions allow. Visual cues: a lone tracker in snow-covered mountains pursuing a beast vanishing into the treeline, a frozen riverside littered with bones, smoke curling over a ridge as a sign of exhausted effort. First half of a \"pursuit-into-surrender\" arc completed by Part II.", "tags": ["Creature/Myth"]}, {"title": "Seekers on the Ridge pt II", "originalArtist": "Goose", "debut": "2020-11-07", "timesPlayed": "52", "notes": "Written by Rick Mitarotonda, debuted 2020, almost always paired live following Part I. Shifts into a meditative, mantra-like register addressing a \"seeker on the ridge\" directly \u2014 a teaching about surrender, that fulfillment or understanding only flows once you let go, and that the seeker won't recognize what they truly seek until finding something within themselves first. Builds toward stillness and oneness rippling outward, closing with anticipation of a long winter finally thawing, opening a path further west. Visual cues: the same seeker turning inward, water beginning to thaw and flow as a metaphor for release, ripples of stillness spreading outward from a single quiet point, a path opening westward as winter ends. Completes the \"pursuit-into-surrender\" arc begun in Part I \u2014 Part I is the chase, Part II is the letting go that resolves it.", "tags": ["Documented"]}, {"title": "Silver Rising", "originalArtist": "Goose", "debut": "2022-02-02", "timesPlayed": "66", "notes": "Written by Rick Mitarotonda & Matt Campbell, off Everything Must Go (2025). Conveys personal change, moving through sadness or uncertainty toward clarity and resilience, set against an energetic rock/funk/electronic blend. Follows a narrator confronting something dangerous and transformative within himself \u2014 an inner \"wolf\" or \"beast\" about to be unleashed, no longer recognizing who he used to be. He warns someone he loves to get away for their own safety as his identity dissolves into something feral, tied to a recurring lunar rhythm beyond his control, building to a standoff and a closing acknowledgment that the transformation, however frightening, reveals something true about him. The Gooseverse's clearest literal werewolf/transformation song \u2014 matches Everything Must Go's own framing of unlikely avatars including werewolves. Visual cues: a figure mid-transformation under full moonlight, silver light catching fur or fangs emerging, a loved one fleeing into darkness while the narrator howls at a rising moon, wild glowing eyes, blood and adrenaline rendered in cold silver-blue tones rather than warm red. Strong candidate to anchor a literal \"Werewolf\" character in the world-building doc.", "tags": ["Creature/Myth"]}, {"title": "Spirit Of The Dark Horse", "originalArtist": "Goose", "debut": "2014-11-26", "timesPlayed": "36", "notes": "Written by Rick Mitarotonda & Trevor Weekz, off Shenanigans Nite Club (2021). Generally recognized as the first Goose song ever written, holding legendary status among fans despite remaining a setlist rarity. Originated after a twelve-minute meditation between co-founders Rick and Trevor. Depicts a small group gathered around firelight at night, with an elder \"uncle\" figure drawing them closer and studying their faces before deciding they're ready for something; he warns that the people they're with aren't who they once were, that something essential has gone missing from their hearts. An unsettled presence stirs at the forest's edge as he urges quiet. Closes on a guardian-like dark force fighting against the night to protect the group's collective soul. Visual cues: a fireside circle at night with a wise elder studying initiates' faces by flamelight, restless shapes stirring past the treeline, a guardian \"dark horse\" entity made of storm and shadow standing between the group and an encroaching threat, gathering thunder as a signal of protection rather than danger. As the reported first Goose song ever written, centered on a ritual night scene with a guiding elder and protective spirit, this is a strong candidate as an origin-point entry for the Gooseverse mythology \u2014 possibly tying to Previcio the Scribe's role as keeper of lore.", "tags": ["Documented"]}, {"title": "Thatch", "originalArtist": "Goose", "debut": "2022-11-13", "timesPlayed": "54", "notes": "Written by Rick Mitarotonda, off Everything Must Go (2025), debuted November 2022. Rick has said it began as a voice-memo idea that sat around before coming together quickly during a transitional period in late 2022. He's described it as building a lush world of sound to wrestle with big questions \u2014 whether you changed your mind or it changed you \u2014 noting we're often surrounded by voices encouraging conformity, and that the song is about staying committed to whatever strange, interesting ideas live inside us. Framed within the album as having a propulsive, door-kicking-down energy. Visual cues: a door being kicked open against resistance, a figure walking against a current of identical conforming silhouettes, strange glowing ideas held protectively close like something fragile but vital, roads splitting between a well-worn beaten path and an overgrown unmarked trail. A \"creative defiance\" anchor song \u2014 pairs with Jive I's refusal of the expected path and Hungersite's resilience theme.", "tags": ["Documented"]}, {"title": "The King", "originalArtist": "Goose", "debut": "2024-12-13", "timesPlayed": "1", "notes": "Debuted at Goosemas Bingo, North Charleston, SC, December 2024. Played only once. **Note: no lyrics, interview, or fan analysis found \u2014 flagged as no-content-available.**", "tags": ["Sparse"]}, {"title": "The Labyrinth", "originalArtist": "Goose", "debut": "2021-06-11", "timesPlayed": "11", "notes": "Written by Rick Mitarotonda, instrumental closing track of Shenanigans Nite Club (2021). A wordless piece featuring winding guitar lines over an atmospheric piano intro, building through composed sections into a frenetic crescendo \u2014 no lyrical content to interpret since it's fully instrumental; meaning lives in mood and musical structure rather than narrative. Visual cues: narrow stone corridors that twist and double back, a journey with no clear exit, mounting tension finally breaking open into wide space at the crescendo. Best treated as a pure mood/environment piece \u2014 a transitional \"level\" or setting within the Gooseverse rather than a song tied to a specific character.", "tags": ["Instrumental"]}, {"title": "The Old Man's Boat", "originalArtist": "Goose", "debut": "2021-10-08", "timesPlayed": "28", "notes": "Written by Rick Mitarotonda, debuted October 2021. Considered part of \"the Elmeg suite\" alongside \"Travelers\" \u2014 a fan-recognized thematic grouping, and one of the most anticipated songs in the catalog. Directly relevant to the Gooseverse given Elmeg the Wise as a named world-building character. Lyrically, the narrator attempts something blindingly bright that nearly costs him his sight, finding only darkness where he expected illumination; wanders aimlessly without direction, wondering if he's tried too hard to force an outcome. Watching birds come and go freely by the water, he wishes for that same weightless ease, with a quiet urgency to leave something lasting behind before time runs out \u2014 closing on a battered old boat far out at sea, somewhere unsafe to be, with an oncoming storm suggested to eventually reveal whatever truth it's hiding. Visual cues: a man staring into blinding light that turns to darkness, a solitary wanderer along a shoreline with no destination, birds skimming freely across water as weightless freedom, an old weathered boat tossed by distant waves, a gathering storm on the horizon that will expose something concealed. Strong candidate to connect directly into Elmeg the Wise's own story \u2014 perhaps as a vessel or journey tied to that character.", "tags": ["Documented"]}, {"title": "The Waking End", "originalArtist": "Goose", "debut": "2014-11-21", "timesPlayed": "1", "notes": "Early-era song, played only once. **Note: no lyrics, interview, or fan analysis found \u2014 flagged as no-content-available.**", "tags": ["Sparse"]}, {"title": "The Whales", "originalArtist": "Goose", "debut": "2020-06-27", "timesPlayed": "44", "notes": "Written by Peter Anspach, off Dripfield (2022). General album framing describes it as evoking good times with friends and being around people you love; no deeper interview on this specific track's meaning surfaced. Lyrically opens on a vivid contrast \u2014 fire against ice, someone submerged watching flame from below the surface \u2014 then shifts into an urgent rescue mission racing across the ocean with animal companions toward dawn. A recurring refrain has the narrator returning to where he began, settling into contentment with a partner while privately sensing she might want a freer life he imagines giving her if he could, swimming off among whales. A second verse pushes the fantasy further outward into an entirely new, unplanned life far north. Visual cues: a struck match glowing against an icy landscape, a submerged figure gazing up at flame through water, sled dogs sprinting across frozen ocean toward sunrise, a couple choosing contentment over an unrealized wilder freedom, whales breaching in open arctic water as the embodiment of that imagined unlived life. A wintry, oceanic counterpart to Arcadia's love-as-wild-pull theme \u2014 here the wildness is acknowledged but gently set aside rather than chased.", "tags": ["Documented"]}, {"title": "This Old Sea", "originalArtist": "Goose", "debut": "2014-12-20", "timesPlayed": "39", "notes": "Written by Rick Mitarotonda, debuted September 2020 at South Farms, Morris CT. No interview on specific meaning found, but resonates strongly with fans for its recurring comfort to a worried child, offering to carry their troubles to the bottom of the sea. One of the catalog's most jam-heavy live vehicles (Notable Jam 15 times), known for extended dreamy-to-rocking improvisation. Lyrically, the narrator watches the sun set repeatedly over the sea, waiting at a door for a familiar sound that may not return; instructs burying twisted, tired thoughts after lifetimes of accumulated weariness. A wandering pair turn over stones in a grove, half-fooled by their search for meaning, hoping for a sign to find them. The emotional center is tender parental reassurance \u2014 telling a worried child to lay down their burden, promising to carry every trouble to the bottom of this ancient sea \u2014 closing on a wondering question about whether reaching heaven requires crossing this same sea. Visual cues: a sun setting again and again over endless water, a door waited beside for a sound that won't return, twisted thoughts buried in dark soil, two wandering figures turning stones in an overgrown grove, a parental hand gently submerging a burden into deep water, a horizon where sea and heaven blur together. The Gooseverse's clearest \"comfort and surrender of burden\" song \u2014 a tender counterpart to Indian River and Rosewood Heart.", "tags": ["Documented"]}, {"title": "Time to Flee", "originalArtist": "Goose", "debut": "2018-03-15", "timesPlayed": "108", "notes": "Written by Peter Anspach, debuted March 2018. The band has described it as being about setting your soul free, especially when a leap of faith feels most daunting. Peter has said the writing process began with a college guitar warm-up technique; he was reflecting on a breakup at the time, feeling emotionally up and down in a way that mirrored the riff and led him to the elevator motif \u2014 a lyrical self-reflection humorously encapsulating the mental disquiet of leaving a lost love in the past. Uses a stalled elevator as a metaphor for feeling trapped in a relationship no longer moving forward \u2014 repetitive, directionless, stuck on a loop. The narrator eventually steps out and walks away while the other person stays behind upset, closing on a quiet moment of doubt over tea, wondering if the relationship was ever truly right. Visual cues: a stalled elevator suspended between floors, two figures trapped together in a small lit box that won't move, one figure stepping out through opening doors into open air while the other remains inside, a quiet domestic aftermath (a steaming cup, a window, soft late light) holding reflective doubt rather than triumph. A grounded, human-scale piece bridging Arcadia's romantic vulnerability and Hungersite's resilience/escape themes.", "tags": ["Documented"]}, {"title": "Torero", "originalArtist": "Goose", "debut": "2025-05-08", "timesPlayed": "4", "notes": "Newer track. Second single off BIG MODERN! (2026), debuted live May 2025 before being reworked for studio release. Described as an evolution of glitzy '80s pop-rock \u2014 an insistent synth pulse, tightly-wound guitar riff, and arena-rock drums building mounting unease; opens with a synthetic drone and reverberating drums like heat waves off a desert highway, building into an adrenaline-fueled nostalgia (\"a Danger Zone for the 21st century\") before a howling outro solo. **Note: no lyrics or lyrical-meaning interview found \u2014 flagged as thin on narrative content; visual cues below are speculative based on title/sound only.** Title translates to \"bullfighter\" from Spanish. Visual cues (speculative): a bullfighter facing something large and dangerous under stadium lights, neon-tinged desert highway heat shimmer, a matador's cape rendered in glitching synth-pop color, mounting tension before a single decisive, cathartic strike. Likely belongs in the same \"modern world/digital anxiety\" visual cluster as Big Modern! and Good2B \u2014 confirm once more lyric-specific material is available.", "tags": ["Sparse", "Thin"]}, {"title": "Travelers", "originalArtist": "Goose", "debut": "2020-06-19", "timesPlayed": "28", "notes": "Written by Rick Mitarotonda, debuted June 2020. First half of a connected three-part work released on the studio EP \"Autumn Crossing\" as \"Travelers I\" and \"Travelers II,\" with \"Elmeg The Wise\" completing the suite (recorded during the Dripfield sessions; video shot in western New York). Rick has called this material personally meaningful, drawing from songs written before Goose formed. Shares lyrical lines directly with \"Elmeg the Wise.\" Framed by fans through a Hero's Journey lens \u2014 departure, initiation, an unresolved return. Depicts travelers gathering at a northern shoreline, preparing to continue south, with a quiet steadying inner voice cutting through doubt during the pause, closing on resignation \u2014 the goal not fully reached, but accepting a return to familiar ground while carrying what was learned. Visual cues: a windswept northern shoreline at dusk where travelers rest before continuing south, hands pressed toward a distant light source, a quiet inward voice depicted as a soft glow or whisper, a journey that loops back on itself rather than completing in triumph. Given its direct tie to Elmeg the Wise (sharing lyrical lines, including a \"voice beneath the quill\"), this strongly suggests Elmeg functions as a guide, mentor, or quill-bearing narrator within this northern-to-southern pilgrimage \u2014 likely the most important song-to-character thread for Elmeg the Wise in the Gooseverse. Note: \"Elmeg the Wise\" itself is credited to Rick Mitarotonda's pre-Goose project St. John's Revival, not Goose proper \u2014 similar to the Yeti/Great Blue situation \u2014 though Goose has performed it live since 2016 and it's treated as part of the band's core catalog via this suite.", "tags": ["Documented"]}, {"title": "Trevor Reads Poetry", "originalArtist": "Goose", "debut": "2020-06-20", "timesPlayed": "7", "notes": "Not a composed original \u2014 this is a fan term for a recurring live ritual where bassist Trevor Weekz occasionally reads poetry aloud mid-show, a beloved, rare crowd moment celebrated by fans on merchandise. Improvisational/spoken-word, varying each time it happens, with no fixed lyrics or narrative. Best treated as a live ritual/character beat for Trevor himself within the Gooseverse rather than a themed song entry.", "tags": ["Documented"]}, {"title": "Turned Clouds", "originalArtist": "Goose", "debut": "2014-11-21", "timesPlayed": "116", "notes": "Written by Rick Mitarotonda, off Moon Cabin (2016) \u2014 the album's opening track. About finding hope and resilience in the face of adversity, with the narrator describing feeling helpless and stuck; functions as a kind of opening invocation for the band's songwriting persona, inviting the listener to drop everything and hit the road. Lyrically, the narrator is worn down by recurring small irritations, replaying a situation and wondering if he could have handled it better; reassures someone close that real change is coming despite present gloom. Insists he doesn't need medication to find calm, just a moment to steady himself, and reflects on choosing a humbler path over flashier rewards even though that choice has worn on him. Pleads for someone to come home rather than keep wandering, recognizing there's no point fighting where you've landed \u2014 closing on an image of floating downriver into the sea toward gentler company, suggesting he too may be moving on soon. Visual cues: storm clouds slowly turning and clearing rather than darkening further, a figure picking thorns from their own leg as self-inflicted small wounds, gold and lead weighed against each other as two values of ambition, a river current carrying a figure gently downstream toward the sea, distant tree-bound figures resembling angels at journey's end. As the literal opening song of Goose's first album, a strong \"origin invocation\" piece for the Gooseverse, complementing Spirit Of The Dark Horse.", "tags": ["Documented"]}, {"title": "Turkish Hills", "originalArtist": "Goose", "debut": "2018-08-02", "timesPlayed": "2", "notes": "Written by Peter Anspach, off Tortilla Party (2018), debuted November 2018. Rarely played live (twice total). Lyrically, the narrator tries to coax someone out of fear and closer to him, with an undertone of manipulation \u2014 admitting his own forethought and framing the connection as a game with shifting rules. The setting shifts to a celebratory scene under the title's namesake hills, toasting champagne at a turning point, weighing whether the moment was genuine feeling or just a gamble. A closing verse turns lighthearted and self-referential, settling into a new place that feels like home despite a slightly chaotic night. Visual cues: a card table lit by lantern light at the base of rolling hills, a champagne toast frozen mid-celebration, two figures circling each other warily \u2014 one coaxing, one guarded \u2014 a hazy, half-remembered night settling into an adopted hometown glow. A wry, ambiguous relationship piece \u2014 a smaller, more intimate cousin to Same Old Shenanigans' nightlife haze.", "tags": ["Documented"]}, {"title": "Welcome To Delta", "originalArtist": "Goose", "debut": "2021-05-09", "timesPlayed": "1", "notes": "Written by Rick Mitarotonda, Peter Anspach, Trevor Weekz, & Ben Atkind, debuted May 2021 at The Caverns, Pelham, TN. Very rarely played (3 times total per setlist tracking); notable mainly as a live jam that crops up inside other songs (e.g. an \"Indian River\" with a Welcome to Delta jam). **Note: no lyrics or interview on meaning found \u2014 flagged as no-content-available.**", "tags": ["Sparse"]}, {"title": "White Lights", "originalArtist": "Goose", "debut": "2018-12-22", "timesPlayed": "73", "notes": "Written by Peter Anspach & Rick Mitarotonda, debuted December 2018 at Goosemas V. Described as a story of unrequited love in a shared classroom setting \u2014 among the first of Peter's songs considered a Goose original rather than a Great Blue holdover. A discography staple despite never appearing on a studio album; carries a winter, fireside quality and has been performed live with fake snow falling over the band. Lyrically, the narrator is preoccupied with a classroom crush, wondering if they're ever thought of in return despite minimal real interaction; describes a vivid dream where the person began drifting into some unknown void and was pulled gently back. Closes on a sense of mutual, almost cosmic recognition \u2014 seeing the future and the stars in this person. Visual cues: a quiet classroom with one figure watching another from behind, soft white winter light falling like snow, a dream sequence of someone drifting weightlessly toward an open void before being pulled back to solid ground, starlight reflected in someone's eyes as a stand-in for deep recognition. A tender, low-stakes teenage-crush entry \u2014 a wintry, intimate counterpart to Arcadia's more intense romantic vulnerability.", "tags": ["Documented"]}, {"title": "The Empress Of Organos", "originalArtist": "Goose", "debut": "(Vasudo-era original, Goose live staple since)", "timesPlayed": "113", "notes": "Written by Rick Mitarotonda & Matt Campbell, originally a Vasudo song, also performed by side-project Orebolo. A major recurring jam vehicle (Notable Jam 16 times). Depicts a group of travelers living freely in the hills, sharing simple harmony, until a commanding figure \u2014 the Empress of Organos \u2014 confronts them: a sorceress-like ruler who claims dominion over buried fears and dark thoughts, threatening to twist their path into shadow if they think they can outsmart her. The travelers respond with defiance, insisting their bond and joy can't be overpowered. Strong named antagonist/ruler character entry. Visual cues: a shadow-sorceress presiding over a mountainous, mysterious \"Organos\" domain, commanding buried fears like seeds she can make grow, confronted by a defiant band of free travelers who refuse to be cowed. One of the most important character entries in the catalog given her centrality to the live show.", "tags": ["Character"]}, {"title": "Yeti", "originalArtist": "Goose", "debut": "2018-10-26", "timesPlayed": "120", "notes": "Credited to Great Blue (Peter Anspach's pre-Goose project with Nick Hanna, Ethan Michael, & Seth Zucker), not Goose proper \u2014 later folded into Goose's live catalog as a long-running staple. Major Gooseverse character relevance given the named \"Yeti\" entity in the world-building doc, BUT important note: the song itself is not creature mythology \u2014 it's a satirical piece mocking the rise of free online products and infomercial-style consumerist sales pitches, with \"Yeti\" functioning as a wry stand-in for an inescapable sales pitch (think late-night TV ad tropes) rather than a snow monster. If the Gooseverse's Yeti character is meant as literal creature mythology, that content is being built independently of this song's actual subject matter \u2014 worth knowing so the visual direction doesn't lean on lyrical material that isn't really there.", "tags": ["Creature/Myth"]}]}, {"title": "Part 1: A\u2013P (Originals)", "status": "Complete. Covers all Goose originals A through P (this table was originally drafted first but is presented here for alphabetical clarity; Part 2 above covers Q\u2013Z).", "songs": [{"title": "726", "originalArtist": "Goose", "debut": "2020-06-20", "timesPlayed": "40", "notes": "An early version developed during the band's pandemic-era Bingo Tour, debuting on its second night, June 20, 2020; evolved into a more developed version since. Read by fans as fundamentally about struggle \u2014 the constant fight to find one's center. Thematically, the song moves through hazy, oppressive summer heat, a narrator gripping onto something too tightly, looking for relief and momentum amid exhaustion, with a recurring sense of isolation, before settling into quiet resolve to keep moving forward despite uncertainty. Visual cues: shimmering heat haze rising off pavement, a figure holding something too tightly with white-knuckled hands, water as elusive relief just out of reach, a lone figure wading through a tide while others seem distant, a quiet, gritty resolve carrying the figure forward despite heat and exhaustion. A grounded \"summer struggle/resolve\" piece \u2014 a tonal cousin to Hungersite's weary perseverance theme.", "tags": ["Documented"]}, {"title": "A Western Sun", "originalArtist": "Goose", "debut": "2015-04-18", "timesPlayed": "80", "notes": "Long-running staple. Written by Rick Mitarotonda, originally titled \"Red Bird,\" off Shenanigans Nite Club (2021). Follows a narrator gazing at a setting sun who hears a reassuring voice asking him to recall his youthful sense of wonder; he mourns having lost that innocence to time and complication. The voice consoles him \u2014 urging him to live fully and mindfully, reassuring him nothing experienced is ever truly lost, that everyone carries an inner spark from an endless fire. Themes: reclaiming wonder lost to age and fear, a dialogue between a weary self and a wiser presence urging him to stop holding back. Recurring vine/growth metaphor for love getting tangled when time moves too fast. Visual cues: a sun low on the western horizon, a figure looking back at their younger self, a vine growing too fast and tangling, a small steady ember glowing inside a weary body, open arms toward an unbounded horizon. Pairs well with All I Need as its more hopeful resolution.", "tags": ["Documented"]}, {"title": "All I Need", "originalArtist": "Goose", "debut": "2017-01-28", "timesPlayed": "157", "notes": "One of most-played originals. Written by Rick Mitarotonda. No specific interview found, but lyrical content is fairly clear: a narrator caught in self-doubt and hesitation, waiting for an inner shift before he can become who he wants to be, aware he's repeating an old pattern and trying to act unbothered. Tension between his current self and an imagined, more confident self; something locked inside he can't voice, missing the key to his own mind. Hopeful turn: what he needs is already on its way, and he may already have it without realizing. Visual cues: a figure waiting at a threshold, a locked chest/chain around the mind, two overlapping versions of the same person (current vs. aspirational self), a key just out of reach, dawn-like anticipation of something arriving but not yet visible.", "tags": ["Documented"]}, {"title": "Animal", "originalArtist": "Goose", "debut": "2022-06-11", "timesPlayed": "79", "notes": "Goose original, debuted 2022. Best-known for a 2023 Newport Folk Festival moment where the Muppet character Animal joined the band onstage on a drum riser after a crowd request, ad-libbing alongside the band. The song itself is a high-energy, body-and-instinct anthem calling a \"brother\" and \"sister\" to recognize something primal and physical, set in jungle/nature imagery (monkeys, canopy, moonlit shadows) against a tense backdrop of danger and being watched (blood on the horizon, eyes on high ground, something breathing close by). Celebrates primal embodiment and movement over overthinking. Visual cues: a jungle canopy at dusk, figures silhouetted in afterglow light, a circling predator overhead, tall grass concealing something close, full-body kinetic movement (climbing, swinging limb to limb). Easter-egg opportunity: a literal Muppet-Animal cameo somewhere in the Gooseverse, given its fan-favorite status.", "tags": ["Documented"]}, {"title": "Arcadia", "originalArtist": "Goose", "debut": "2014-11-21", "timesPlayed": "218", "notes": "Most-played Goose original; signature jam vehicle. Written by Rick Mitarotonda (Moon Cabin, 2016). Uses the Greek myth of Arcadia \u2014 a wild, idealized refuge \u2014 as a metaphor for falling into a destabilizing love. Themes: vulnerability, fear of being hurt vs. the pull to keep moving toward connection, fragile/untamed growth (vine-on-a-rose imagery), slow healing through love. Visual cues: overgrown gardens, wild roses, a runner moving toward a glowing pastoral horizon, light breaking into a dim room, fragile-but-tenacious imagery (a thin stem holding weight).", "tags": ["Documented"]}, {"title": "Arrow", "originalArtist": "Goose", "debut": "2019-12-21", "timesPlayed": "95", "notes": "Written by Rick Mitarotonda, single off Dripfield (2022). Rick has described it as being about giving everything you've got to something \u2014 the moment you've given your best shot and have no choice but to surrender to wherever things land, a moment that feels like forever. Imagery moves from heat/passion (fire, summer) into flight and surrender once the \"arrow\" is loosed \u2014 the arrow as a metaphor for ambition and direction, reclaiming purpose as it soars. Themes: full commitment, then release of control over the outcome. Visual cues: a drawn bowstring at full tension, an arrow mid-flight against open sky, sun-drenched summer light, a long suspended freeze-frame moment of release, mist parting beneath the arrow's path. Pairs with Arcadia and Hungersite as a trio about giving fully to something uncertain.", "tags": ["Documented"]}, {"title": "Atlas Dogs", "originalArtist": "Goose", "debut": "2022-01-28", "timesPlayed": "61", "notes": "Written by Rick Mitarotonda & Matt Campbell, debuted 2022. No specific interview found; reading from lyrical content: a narrator caught between civilization and wildness, set in a stark desert under moonlight, torn between fear of devastation and the drive to rebuild, longing to shed an old identity like a skin and return to instinct. A second figure in a valley faces a choice between staying lost in darkness or moving toward light. Often used as a set-opener live, matching its tribal, urgent groove. Visual cues: a mountain under a yellow desert moon, a lone shadow against starlight, a figure shedding skin to return to wildness, nettles swaying in a valley, a fork between darkness and light. Connects well with Animal and Madhuvan as a \"threshold between civilization and wild self\" trio.", "tags": ["Documented"]}, {"title": "Big Modern!", "originalArtist": "Goose", "debut": "2024-09-01", "timesPlayed": "35", "notes": "Title track of 2026 studio album. The band described Big Modern! as a fully immersive world of sound capturing the feeling of moving through today's overstimulated, hyperconnected society. The title track dives into the erratic unpredictability of modern life, with one reviewer describing it as a lyrical list of non sequiturs whose abstract images suggest coded meanings, evoking Talking Heads. Marketing leaned into the theme \u2014 the band wore yellow hoodies spelling \"FACE,\" a key lyric from the song, during a surreal promo stunt. Themes: sensory overload, identity flattened into image, frantic and absurd modern hyperconnection \u2014 satirical rather than despairing. Visual cues: glitching screens, a face replicated infinitely (billboards, feeds, a hall of mirrors), an overstimulated neon cityscape at night, 80s synth-pop palette (hot pink, electric blue, chrome), a figure dissolving into static/pixels. The \"modern world\" pole of the Gooseverse, contrasting the mythic/nature songs like Creatures and Madhuvan.", "tags": ["Creature/Myth"]}, {"title": "Bingo Tour Theme", "originalArtist": "Goose", "debut": "2021-07-03", "timesPlayed": "3", "notes": "Tour-specific piece", "tags": ["Documented"]}, {"title": "Bob Don", "originalArtist": "Goose", "debut": "2020-01-24", "timesPlayed": "58", "notes": "One of Rick Mitarotonda's earliest compositions, written in his prolific early teenage years before Goose existed. No specific interview found. Lyrically about restless anticipation \u2014 waiting for something to arrive without knowing what or when, paired with a yearning to return to an easier, less worried state of mind; a search for some kind of escape from present overthinking. Visual cues: a figure waiting at a window or doorway, a clock or hourglass suspended mid-motion, a path leading back toward a simpler, sunlit memory, a door cracked open marked escape. Quieter and less mythic than most catalog entries \u2014 useful as a transitional/in-between mood piece.", "tags": ["Documented"]}, {"title": "Borne", "originalArtist": "Goose", "debut": "2022-01-28", "timesPlayed": "55", "notes": "Written by Rick Mitarotonda, opening track of Dripfield (2022), first in the \"Dripfield trio\" (Borne, Hungersite, Dripfield). Rick has described it as an unfiltered breath of newness and a beginning statement \u2014 a declaration to oneself not to overthink things or make them more than they should be, a reminder to be honest and let the work be what it is. The trio is praised for soaring harmonies and nuanced jams marking Goose's studio maturation. Music video shot in the Mojave Desert. Themes: creative honesty, releasing self-judgment and overanalysis, trusting presence over forced meaning. Visual cues: a wide desert horizon at dawn, a tumbleweed rolling loose and unburdened, a figure setting down something heavy and walking forward lighter, clean open light rather than ornate detail \u2014 the simplest, least cluttered visual entry in the catalog, matching its \"don't overthink it\" message.", "tags": ["Documented"]}, {"title": "California Magic", "originalArtist": "Goose", "debut": "2022-03-01", "timesPlayed": "53", "notes": "Written by Rick Mitarotonda, debuted live at the 9:30 Club, D.C., March 2022; off Everything Must Go. Explores the allure and mystique of California \u2014 finding something extraordinary in its culture, with a sense of enchantment and escapism. Moves through scattered, satirical snapshots: fortune tellers, a beach preacher, a leopard-print figure on rollerblades, techno kids dancing, a robot in a trance \u2014 celebrating vibrant, slightly absurd West Coast culture with wry humor. Also features mythic, awe-inspiring imagery (a tightrope walker on water, a figure carrying the skyline on his shoulders). Read by some as a song about the search for self-fulfillment through communal music, religion, or mysticism. Visual cues: a beach preacher with a megaphone, a leopard-print figure on rollerblades gliding across pavement, a chrome car gleaming like molten metal, a tightrope walker suspended over open water, a city skyline balanced on someone's shoulders \u2014 high-saturation, surreal Americana pop imagery. The Gooseverse's wry \"pop-art California\" pocket, distinct from the more reverent/mythic songs.", "tags": ["Documented"]}, {"title": "Creatures", "originalArtist": "Goose", "debut": "2015-10-01", "timesPlayed": "144", "notes": "Written by Rick Mitarotonda, debuted 2014, no studio release yet \u2014 limited press trail. Lyrically moves through nocturnal, mythic animal imagery: things marking bark in the dark, a fire on a beach drawing figures toward it, bodies gliding through water, rain on a lake. A second movement features a prowling lion, a tiger, a moth-like figure circling flame, and a phoenix rising \u2014 each tied to a small lesson about urgency, presence, transformation, and not waiting. Likely the most directly \"creature-rich\" Goose original \u2014 strong bestiary candidate. Visual cues: night woodland creatures, firelight on a beach, glassy water-creatures, a prowling big cat, moth-and-flame dynamic, a phoenix mid-transformation.", "tags": ["Creature/Myth"]}, {"title": "Doobie Song", "originalArtist": "Goose", "debut": "2019-03-01", "timesPlayed": "24", "notes": "Debuted March 2019. A lighthearted, plainly literal song about smoking together \u2014 casual, communal fun rather than deeper metaphor; no hidden-meaning interview exists because there doesn't seem to be one. One of Goose's more straightforwardly silly, party-atmosphere tunes. Visual cues: warm haze, curling smoke trails, a relaxed circle of friends passing something between them, soft-focus golden light, a loose and woozy visual style (objects slightly melting or drifting). A good \"levity\" entry \u2014 useful as a tonal palate-cleanser between heavier pieces like Dr. Darkness or Indian River.", "tags": ["Documented"]}, {"title": "Dr. Darkness", "originalArtist": "Goose", "debut": "2022-01-26", "timesPlayed": "47", "notes": "Written by Rick Mitarotonda & Matt Campbell, debuted 2022. A fan annotation reads Dr. Darkness as a personification of our own flaws and self-sabotaging qualities crossed with subconscious and ego \u2014 self-doubt, low self-esteem, negative self-talk, the \"own worst enemy\" idea; even once noticed, these patterns don't disappear, they remain nearby and watching. Lyrically structured like a horror-noir character study: a shadowy doctor figure who walks the streets unnoticed, \"treats\" people by feeding their doubt then blaming them for the damage, sneaks into vulnerable quiet moments, and commands a retinue of sinister followers watching from rooftops. A vivid externalization of intrusive, self-sabotaging thought as a literal predatory character. Visual cues: a gaunt man in a long coat carrying a doctor's bag of false medicine, a retinue of shadowy figures crouched on rooftops, silence itself rendered as his shadow/silhouette, a victim slipping at home as he watches impassively. Strong recurring villain/antagonist candidate for the Gooseverse's mythology.", "tags": ["Character"]}, {"title": "Dragonfly", "originalArtist": "Goose", "debut": "2021-10-09", "timesPlayed": "7", "notes": "Credited to Rick Mitarotonda, Peter Anspach, Trevor Weekz, Ben Atkind, & Jeff Arevalo collectively. Very rarely played. **Note: no lyrics or interview found, and it appears to function mainly as a brief instrumental/jam segment rather than a full song with lyrical content \u2014 flagged as no-content-available.** (A same-titled Phish song appeared in search results but is unrelated to Goose.)", "tags": ["Sparse"]}, {"title": "Dripfield", "originalArtist": "Goose", "debut": "2022-02-26", "timesPlayed": "72", "notes": "Also an album/release title. Written by Rick Mitarotonda, title track of Dripfield (2022). Emerged from a jam during a Bingo Tour livestream soundcheck during the pandemic; Rick wrote lyrics afterward. Part of the \"Dripfield trio\" (Borne, Hungersite, Dripfield) \u2014 the album's opening run, marking the band's growth into a more mature studio sound. Rick has described his recent songwriting as impressionistic \u2014 lyrics sometimes barely audible or just sound, prioritizing feeling over narrative. **Note: lyrical meaning is thin/uncertain \u2014 no confident read available; flagged rather than guessed.** Visual cues (speculative, based on origin/title): slow accumulation \u2014 water collecting drop by drop, a held note crystallizing into form, something taking shape out of stillness and waiting. Treat as more abstract/textural than narrative.", "tags": ["Thin"]}, {"title": "Drive", "originalArtist": "Goose", "debut": "2018-08-03", "timesPlayed": "121", "notes": "One of Rick Mitarotonda's earliest compositions, written in his teenage years before Goose formed. No documented interview on specific meaning. Lyrically dreamy and repetitive, centered on a recurring image of driving and chasing the same dream across distance, with a call-and-response \"next time\" refrain and a watery, oceanic image partway through \u2014 more mood piece than narrative. A major jam vehicle live (Notable Jam 30+ times). Visual cues: an open road stretching to the horizon, looping/d\u00e9j\u00e0 vu imagery (a wheel, a spiral), waves moving inside a shell (echo, distant motion), a repeated goodbye gesture, dreamlike haze over sharp narrative. Good \"road/journey between worlds\" anchor song.", "tags": ["Documented"]}, {"title": "Echo of a Rose", "originalArtist": "Goose", "debut": "2014-11-21", "timesPlayed": "124 (as Goose; also 10x as Vasudo)", "notes": "Written by Rick Mitarotonda & Matt Campbell \u2014 per Campbell, the first song the two truly wrote together in a room, originally a Vasudo track. Started whimsical/reggae-tinged, later reworked live into a funk-driven, improv-centric psychedelic piece. Lyrically follows a disengaged narrator pulled toward a dreamlike vision: a doorway opens, a mysterious guide figure beckons him to abandon his old identity and follow her into an unknown, vine-tangled world. Mood: hypnotic, surrendering, transportive. Visual cues: an open door at the edge of the ordinary, a beckoning guide/temptress figure, ivy wrapping a spine, weightless ascension, an interior \"jungle room\" \u2014 inner wilderness rather than outer nature.", "tags": ["Documented"]}, {"title": "Dustin Hoffman", "originalArtist": "Goose", "debut": "2025-05-10", "timesPlayed": "19", "notes": "Newer track. Off Everything Must Go (2025) \u2014 one of two tracks on the album (with \"Iguana Song\") with no prior live history before release. Press described its sound as 70s-flavored funk with brass instrumentals, light-hearted and easy-breezy, built around a guitar solo and laid-back jam. **Note: no interview on lyrical meaning found, and lyrics read impressionistic/fragmented rather than narrative \u2014 flagged as thin/uncertain on theme.** Visual cues (based on documented tone): warm amber and brass-gold tones, a loose strutting walk-cycle motion, light scattering through movement, shadows trailing behind a figure mid-stride. A groove/texture piece, similar in treatment to Elizabeth and Jive Lee.", "tags": ["Thin"]}, {"title": "Earthling or Alien?", "originalArtist": "Goose", "debut": "2020-11-06", "timesPlayed": "50", "notes": "Also the name of a dedicated chart on El Goose tracking this lyric/keyword. Written and sung lead by Peter Anspach, debuted 2020 at South Farms in Morris, CT, with a clavinet-driven jam featuring extraterrestrial-sounding phaser effects. No interview on specific meaning found; lyrically the narrator feels disconnected from human society, like an outside observer watching daily habits (email, the clock) and noticing environmental/social complacency, including pointed commentary about the wealthy being insulated from consequences others face. Recurring image of floating weightlessly and being unable to find one's own house, with a repeated, unresolved question about identity and belonging. Themes: alienation, displacement, eco-anxiety, uncertain belonging. Visual cues: a figure drifting weightlessly above a city it no longer recognizes, looking down at a house that isn't there, a green eco-anxious palette contrasted with cold blue digital glow (screens, clocks), a being who looks human but moves slightly wrong \u2014 too still, too observant, gently uncanny. A melancholic \"outsider looking in\" cousin to Dr. Darkness's character-driven approach.", "tags": ["Documented"]}, {"title": "Elizabeth", "originalArtist": "Goose", "debut": "2018-03-15", "timesPlayed": "65", "notes": "Written by Peter Anspach & Rick Mitarotonda, very early in their songwriting career as teenagers; recorded under producer D. James Goodwin alongside the Dripfield sessions (released as part of Undecided). **Note: no confident lyrical-theme read available \u2014 flagged as thin/uncertain rather than guessed.** Documented mainly as a strong live jam vehicle with an upbeat groove that opens into extended improvisation. Visual cues: treat as a groove/movement piece (bright, danceable energy) rather than narrative until lyrical themes are confirmed from a legitimate source.", "tags": ["Thin"]}, {"title": "Everything Must Go", "originalArtist": "Goose", "debut": "2022-10-01", "timesPlayed": "46", "notes": "Also a live album title. Written by Rick Mitarotonda & Matt Campbell, title track of Everything Must Go (2025). Rick has described the title as a mantra for the record on multiple levels \u2014 after a long build-up to making the album, the impulse was to throw everything at it and wipe the slate clean, opening space for new creative exploration; a significant life/band change happening simultaneously added depth, making the record a cathartic through-line for that evolution. The album overall is framed by the band as offering unlikely narrators (werewolves, iguanas, street preachers, jungle primates), each a lyrical examination of self circling the question \"who am I?\" \u2014 searching through self-discovery and transformation, each crossroads offering a path forward. The title track itself functions as a clearing-the-slate mission statement, similar to Borne's role on Dripfield. Visual cues: a slate being wiped clean, an old structure (house, stage, shell) emptied room by room, ash and renewal together, open doors with nothing behind them yet \u2014 pure potential. Could serve as a framing/title-card piece for the whole Gooseverse, introducing the idea of shifting selves/avatars.", "tags": ["Creature/Myth"]}, {"title": "fast:slow", "originalArtist": "Goose", "debut": "2025-05-09", "timesPlayed": "5", "notes": "Newer track. Released on Chateau Sessions pt III (2025). **Note: no lyrics or interview found yet \u2014 flagged as no-content-available. Likely thin documentation given its recency; revisit later as more material surfaces.**", "tags": ["Sparse"]}, {"title": "Feel It Now", "originalArtist": "Goose", "debut": "2023-03-11", "timesPlayed": "36", "notes": "Written by Peter Anspach & Trevor Weekz, off Everything Must Go (2025). No interview on specific meaning found; the album's own framing notes \"you're allowed to feel it now\" as one of several guiding lines scattered through the record rather than part of a single road map. Lyrically set in a wintry, natural landscape \u2014 an owl retreating into the forest, stone and snow, the cold closing in \u2014 with a tender address to someone close, marking the end of winter as a metaphor for finally releasing suppressed emotion. A quieter second movement concerns searching for a kindred presence and choosing solitude over continuing to lean on others. Visual cues: an owl disappearing into bare winter trees, stone worn smooth by cold, snow beginning to melt as emotional thaw, two figures close together in fading winter light, sand sinking beneath still water. A quieter, wintry mood piece \u2014 useful as a seasonal anchor paired against warmer songs like Arrow or California Magic.", "tags": ["Documented"]}, {"title": "Give It Time", "originalArtist": "Goose", "debut": "2024-04-09", "timesPlayed": "40", "notes": "Written by Rick Mitarotonda, lead single off Everything Must Go (2025). A product of the band's reconfiguration and reinvention in 2024 \u2014 a song they'd had around for a while that finally clicked once rehearsing with the new lineup. Rick has called it an anthem of that transitional period, carrying doubt, excitement, and the possibility of something new, noting it felt significant that the song is literally about patience and letting things come to you. Peter Anspach has framed it as a triumphant celebration of the band's journey \u2014 from small bars to Madison Square Garden, built on perseverance and brotherhood. The music video, shot in purple/red/magenta tones, centers on brotherhood and shared experience, building from a lone vocalist to a full group celebration. Themes: trusting a slow unfolding, patience as active practice, gratitude for a hard-earned journey. Visual cues: a long road behind a traveling group lit in purple/magenta dusk light, hands linked or shoulders touching, a seed slowly opening into bloom in time-lapse, a small van giving way to a vast arena \u2014 scale growing visibly over time. Strong \"patience and arrival\" anchor piece.", "tags": ["Documented"]}, {"title": "Gone Gone Good", "originalArtist": "Goose", "debut": "2014-11-21", "timesPlayed": "3", "notes": "Early-era song, only played 3 times, last performed 2015-03-14. **Note: no lyrics or interview found \u2014 flagged as no-content-available.**", "tags": ["Sparse"]}, {"title": "Good2B", "originalArtist": "Goose", "debut": "2026-04-10", "timesPlayed": "6", "notes": "Brand new, 2026. Written by Rick Mitarotonda & Matt Campbell, lead single off Big Modern! (2026). Rick has described it as surrendering to an ecstasy within chaos \u2014 a personal oasis in the algorithm, the moment the whole world of content and convenience is at your fingertips and just feels good, with a quietly looming question underneath: wait, is it though? A never-ending party with a looming expiration date \u2014 joyous and messy, reward and distraction, intoxicating lightness laced with an anxious undercurrent. Musically a conga groove that turns cinematic, guitar leads cutting in like fragments of an aimless social scroll; reflects on life's fleeting nature through list-like lyrics, with themes of desire and distraction casting shadows over an otherwise sunny tune. Visual cues: a grocery aisle rendered as a glittering fever dream, an electric slide down an endless candy-colored hallway, hands reaching for things that dissolve before they're grasped, a party with a ticking clock just out of frame \u2014 joy and unease sharing the same palette. Direct companion piece to Big Modern!, same digital-age anxiety theme but warmer and more seductive rather than glitchy/cold.", "tags": ["Documented"]}, {"title": "Gringo", "originalArtist": "Goose", "debut": "2014-12-20", "timesPlayed": "5", "notes": "Early-era song, very rarely played (4 times total, last played 2019). **Note: no lyrics or interview found \u2014 flagged as no-content-available rather than guessed.** Visual direction: hold off until a legitimate lyric source can be found.", "tags": ["Sparse"]}, {"title": "Happy Birthday", "originalArtist": "Goose", "debut": "2018-02-15", "timesPlayed": "6", "notes": "Original arrangement, not the standard. Note: this is the band performing the traditional public-domain \"Happy Birthday to You\" tune live, typically as a spontaneous serenade for a fan in the crowd (with cupcakes and candles) \u2014 not a Goose original composition with its own lyrical theme. Best treated as a live-ritual/Easter-egg moment in the Gooseverse (a celebratory crowd interlude) rather than a thematic song entry.", "tags": ["Documented"]}, {"title": "Honeybee", "originalArtist": "Goose", "debut": "2019-12-21", "timesPlayed": "35", "notes": "Off Dripfield (2022), part of the album's gentler, acoustic-leaning closing pair (with Moonrise). Press coverage describes it as an \"airy love song,\" notably featuring \"Coach\" Jon Lombardi guesting on rainstick. **Note: no confident lyrical-theme read beyond this \u2014 flagged as thin/uncertain.** Visual cues (based on documented tone/instrumentation): soft rain or mist, light filtering through leaves, something delicate and humming, warm pastel tones rather than the intense/mythic palette of songs like Madhuvan or Creatures. A tender, hushed companion to weightier love songs like Arcadia.", "tags": ["Thin", "Creature/Myth"]}, {"title": "Hungersite", "originalArtist": "Goose", "debut": "2022-02-26", "timesPlayed": "86", "notes": "Written by Rick Mitarotonda, off Dripfield (2022). A tonal departure from Goose's usual groove sound \u2014 melody-forward with lyrics about intentional, empathetic living. Rick has described it as personifying different facets of hunger: longing for sustenance both physical and emotional. Mood is weary but defiant \u2014 tired of old burdens, questioning whether it's time to set down conflict, but refusing to give up, climbing toward something nearly in view. The official video follows an office worker who finds an old exercise tape and turns his life around through small, stubborn self-renewal. Visual cues: a frayed rope (hope stretched thin), rust and wreckage giving way to a climb, a figure shedding armor, open air atop a hard ascent, gray weariness breaking into light.", "tags": ["Documented"]}, {"title": "Indian River", "originalArtist": "Goose", "debut": "2014-12-20", "timesPlayed": "118", "notes": "Written by Rick Mitarotonda, off Moon Cabin (2015). Rick has said the song is about experiencing loss \u2014 people you're used to interacting with physically no longer being reachable that way \u2014 and seeking other means of connection, tied to an interest in synchronistic signs. Embeds a Bhagavad Gita passage about the soul's indestructibility as the emotional resolution. Mood: meditation on grief and impermanence \u2014 wind, swaying trees, and moonlight stand in for sensing a departed presence; frustration at a voice felt but not heard gives way to acceptance and letting go (a seed dropping into snow), grounded by a quiet undercurrent of continuity. Visual cues: wind moving through trees as a trace of the unseen, moonlight as a faint signal, a seed falling into snow, a river as metaphor for time passing, heaviness/fog contrasted with a steady underlying current.", "tags": ["Documented"]}, {"title": "Interlude I / II / III", "originalArtist": "Goose", "debut": "2019-11-09 / 2024-04-08 / 2024-04-08", "timesPlayed": "2 / 14 / 1", "notes": "Instrumental set. Interlude I & II released on Moon Cabin (2016), written by Rick Mitarotonda. These function as instrumental bridge passages connecting other songs live (frequently pairing into \"Jive I\") rather than standalone songs with lyrics. No thematic/lyrical content to interpret \u2014 best treated in the Gooseverse as transitional \"in-between\" visual moments (a literal bridge, threshold, or liminal space connecting two scenes) rather than a song with its own narrative.", "tags": ["Documented"]}, {"title": "Into the Myst", "originalArtist": "Goose", "debut": "2014-12-23", "timesPlayed": "83", "notes": "Written by Rick Mitarotonda, off Moon Cabin (2015). No specific interview found; reading from lyrical content: a song about breaking free from constraint and rigidity, pushing past fear into collective, untethered motion. Imagery of climbing toward light, shadows breaking apart, kneeling in mud while afraid of one's own vulnerability, then a turn into defiance \u2014 rising on a tide, storming gates, becoming unstoppable. Moves from guarded tension into a surge of liberation, framed communally (\"we\") rather than solitary. Visual cues: climbing toward a glowing light, shadows cracking like glass, mud and fire as opposing elements (grounded fear vs. consuming release), a rising tide breaking through storm gates, a crowd surging forward together, untethered and unstoppable.", "tags": ["Documented"]}, {"title": "Jam", "originalArtist": "Goose", "debut": "2014-11-21", "timesPlayed": "26", "notes": "Open improv designation", "tags": ["Documented"]}, {"title": "Jive I", "originalArtist": "Goose", "debut": "2014-11-21", "timesPlayed": "135", "notes": "Originally \"Wiltonian Jive\" \u2014 Rick Mitarotonda's first written song for Goose, off Moon Cabin (2016). Debuted at the inaugural Goosemas in December 2014, renamed when Jive II arrived a few months later. Reads thematically as a refusal of the promise of greener grass elsewhere \u2014 Rick rejects an antagonist's offer and doubles down on certainty about what's best for himself and the band, building into a confident victory lap that forges its own path while remembering its Wilton, Connecticut roots. Visual cues: a figure walking confidently away from a fading hometown horizon, golden light ahead contrasted with gray behind, refusing an outstretched hand or offered plate. Pairs with Jive II as a \"coming of age and resistance to control\" duo \u2014 Jive I is the declaration of independence.", "tags": ["Character"]}, {"title": "Jive II", "originalArtist": "Goose", "debut": "2015-03-14", "timesPlayed": "88", "notes": "Written by Rick Mitarotonda, first performed March 2015 at Jimmy's Seaside Tavern, Stamford, CT. Rick has said the song's content was inspired by a sense of discontent he and his friends felt growing up in their upper-middle-class Connecticut surroundings. Reads as an alarmed, nervously angry observation from a young narrator watching people in their community ground away by routine, before a controlling figure arrives and asserts dominance over the rules of the game. The narrator questions whether they were foolish to have believed in something epic or magical, wondering if everyone is simply being controlled, before a closing reflection on small, simple truths that follow a person to the grave. Visual cues: a controlling, bell-ringing figure looming over a community trapped in repetitive motion (grinding gears, teeth, clockwork), a husk being peeled back to reveal something tender and simple underneath. Pairs with Jive I as the disillusioned reckoning that follows its declaration of independence.", "tags": ["Documented"]}, {"title": "Jive Lee", "originalArtist": "Goose", "debut": "2018-06-02", "timesPlayed": "88", "notes": "Credited to Rick Mitarotonda, Peter Anspach, Trevor Weekz, & Ben Atkind collectively, debuted 2015. A major live jam vehicle (Notable Jam 14 times). **Note: no lyrics transcribed anywhere found and no interview on meaning \u2014 flagged as no-content-available rather than guessed.** Visual direction: hold off until lyrics can be sourced legitimately; in the meantime, treat purely as a high-energy instrumental/groove entry.", "tags": ["Sparse"]}, {"title": "Lead the Way", "originalArtist": "Goose", "debut": "2014-12-20", "timesPlayed": "89", "notes": "Written by Rick Mitarotonda, off Moon Cabin (2016). Rick has explained the song is about losing someone he knew was dying \u2014 the beginning expressing a wish to escape together, a form of denial and holding on tightly; the ending represents acceptance, with the final chorus shifting from pleading for the person to stay forever into instead asking them to lead the way to \"our heaven.\" Themes: restlessness with a life that no longer feels like enough, a desperate plan to run away together while there's still time, acknowledging the person's steadiness through hardship, and ultimately surrendering the wish to keep them here in favor of trusting them to go ahead. The shift from \"stay with me\" to \"lead the way\" is the emotional crux \u2014 denial transforming into trust. Visual cues: a packed getaway car under an orange-red sunset reflected in a rearview mirror, two figures driving away from something receding behind them, mountains ahead lit by a rising dawn (sunset/sunrise as denial vs. acceptance), a steady hand holding firm through storm-dark weather, an open road becoming a path toward something beyond the horizon. A deeply personal grief-and-release piece \u2014 pairs with Indian River, though warmer and more intimate where Indian River is cosmic and abstract.", "tags": ["Documented"]}, {"title": "Lead Up", "originalArtist": "Goose", "debut": "2023-03-10", "timesPlayed": "38", "notes": "Written by Rick Mitarotonda, second single off Everything Must Go (2025), reemerged from a song originally written during his early teenage years. Press described it as laced with introspective, melancholic lyrics with a psychedelic undercurrent giving it a dreamlike edge. Opens with a distant howl cutting through stillness in the band's ethereal register; searching lyrics read melancholic but acid-tinged. A pacing snare gathers energy, building through a forceful chorus into Rick's searing distorted guitar, before ending as softly as it began, with echoing chorus lines haunting the final measures. Themes: regret, the desire to undo something painful, worry over wasted time, wrapped in a hazy, searching, slightly hallucinatory atmosphere. Visual cues: a lone howl echoing across an empty landscape, fog rolling over rocky terrain, hands reaching for something already slipping away, a slow-building storm that breaks violently then dissolves into mist, acid-wash color bleeding at the edges of an otherwise plain scene. A \"haunted regret\" counterweight to the more triumphant Give It Time on the same album.", "tags": ["Documented"]}, {"title": "Life On The Shelf", "originalArtist": "Goose", "debut": "2021-10-09", "timesPlayed": "9", "notes": "Written by Peter Anspach, debuted October 2021. Lyrically centers on a child's experience of a parent's absence \u2014 feeling worn down and weighed on, sensing something dark beneath the household's surface, jealousy toward whatever is taking up the parent's attention instead. Frames the pain as tolerable on its own \u2014 it's the father's specific abandonment that makes it hurt. A gentler second verse contrasts this with a treasured warm memory together before circling back to the same wound, closing on an image of breaking free \u2014 needing to leap and land somewhere new, unburdened. Visual cues: a child figure sitting still on a literal or metaphorical shelf, left out and gathering dust, paired with a flickering memory of warmth (fireworks, summer light, a parent's arms) intruding on an otherwise gray, static scene; a leap into open air as the closing release. The Gooseverse's clearest \"child/family wound\" entry \u2014 pairs with Indian River and Lead the Way in a loss/longing cluster, though specifically about abandonment rather than death.", "tags": ["Documented"]}, {"title": "Madalena", "originalArtist": "Goose", "debut": "2025-08-13", "timesPlayed": "10", "notes": "Newer track. Lead single off Chain Yer Dragon (2025), surprise-debuted on The Tonight Show with Jimmy Fallon. Described in press as an emotionally resonant, reflective, mid-tempo jam-rock tune. Chain Yer Dragon was recorded live in the studio to capture the feel of Goose's live show, contrasting the more polished, atmospheric Everything Must Go. No band interview on specific meaning found; reading the lyric content: follows a narrator worn out from running from his life, drifting through liminal Southwestern landscapes (desert towns, a car at night, a face against a window watching dawn approach), addressing someone directly and asking them to stay rather than let the night end, with imagery of two people holding up the sky together and painting a new horizon. A secondary thread follows a side character dancing through a faded old town, evoking ghosts and nostalgia for a wilder past. Visual cues: car headlights cutting through desert dark, a face pressed to glass watching dawn approach, two figures holding up a bruised, bleeding-colored sky together, a half-abandoned town with faded neon, ghostly dancers in an empty building. Pairs with Drive and A Western Sun as a \"Southwest desert road\" visual cluster.", "tags": ["Documented"]}, {"title": "Madhuvan", "originalArtist": "Goose", "debut": "2014-12-20", "timesPlayed": "183", "notes": "Heavily played, major jam vehicle. Written by Rick Mitarotonda, single off Shenanigans Nite Club (2021). Rooted in the story of Dhruva from the Bhagavata Purana \u2014 a rejected prince who retreats into the Madhuvan forest for intense spiritual practice and finds enlightenment. Rick has described picturing a lone man walking through a desert, with multiple narratives layered at once; press materials fr
