ame it as a journey weighing life's pitfalls against its beauty, questioning what's truly worth pursuing. Themes: restless searching, the hollowness of material wealth, eventual surrender into stillness. Visual cues: a lone wanderer crossing dunes, a distant ledge or mirage always out of reach, maze-like storm/sand/bone imagery, gold that feels weightless, transitioning into a dense, sacred forest at dusk.", "tags": ["Documented"]}, {"title": "Mini Mall Rap", "originalArtist": "Goose", "debut": "2020-06-26", "timesPlayed": "1", "notes": "A novelty/comedic bit parodying a viral flea-market promotional video, played only once during the 2020 Bingo Tour. Not a Goose original carrying the band's own themes or imagery \u2014 best treated as a one-off Easter egg/in-joke rather than a codex entry with visual direction.", "tags": ["Documented"]}, {"title": "Mr. Action", "originalArtist": "Goose", "debut": "2022-12-18", "timesPlayed": "40", "notes": "Written by Rick Mitarotonda & Matt Campbell, off Chain Yer Dragon (2025), debuted live December 2022. No interview on meaning found; lyrically framed as a tribute to a theatrical, masked figure who thrives on illusion and misdirection, has \"died a thousand times\" performing for an audience, and is debated over whether his power comes from charm or something more mystical. Enigmatic, carries small talismans of luck, plays an instrument that seems to channel something beyond ordinary reality. Closing thesis: you can only truly know yourself by first putting on another identity \u2014 wearing a mask to see more clearly who you are underneath. Strong character entry \u2014 Mr. Action as a mythic performer/trickster figure. Visual cues: an ornate stage mask that seems to hold its own life, a tower watched over from a distance, small charms or amulets (a sachet, a worn instrument with strange patina) hinting at hidden power, a stage that blurs into something otherworldly mid-performance. Pairs with Dr. Darkness as a theatrical, performative figure, but reads as a benevolent trickster-mentor rather than a predator \u2014 uses illusion to reveal truth rather than conceal it.", "tags": ["Character"]}, {"title": "Not Alone", "originalArtist": "Goose", "debut": "2023-03-09", "timesPlayed": "6", "notes": "Sung lead by Rick Mitarotonda, debuted March 2023 at The Capitol Theatre, Port Chester, NY \u2014 started quiet with reflective, hopeful lyrics before building to a climactic finish punctuated by a soaring guitar solo. No interview on specific meaning found; lyrically reads as a gentle release of someone who's been struggling \u2014 an exhausted, smothered figure who has run their course, being told it's safe to stop fighting and rest rather than keep running. A tender, almost lullaby-like reassurance, with natural imagery (sun, blood, cold) repurposed as protective forces rather than threats, ending on comforting insistence that the listener isn't alone. Visual cues: a figure finally setting down a heavy weight after a long struggle, sunlight wrapping protectively rather than burning, a steady presence beside someone collapsing safely into rest, warmth pushing back against cold and isolation. A tender companion to Hungersite's resilience theme \u2014 less about pushing forward, more about finally being allowed to stop.", "tags": ["Documented"]}, {"title": "One In, One Out", "originalArtist": "Goose", "debut": "2024-09-02", "timesPlayed": "13", "notes": "Written by Peter Anspach, debuted 2024. Described live as having an upbeat, almost Peter Gabriel-like vibe with marimba piano, anthemic in quality, with chorus touches evoking the chord structure and melody of \"How It Ends.\" **Note: no lyrics found and no interview on meaning \u2014 flagged as thin/uncertain.** Visual cues (speculative, based on tone and title only): bright, percussive, rhythmic energy; a turnstile or revolving door as a nod to the title's exchange concept \u2014 to be confirmed once lyrics are available from a legitimate source.", "tags": ["Sparse", "Thin"]}]}, {"title": "Part 3: Additional Originals Found via Master List (incl. Vasudo, Great Blue, St. John's Revival, Orebolo, Swimmer credits)", "status": "In progress. These songs are part of Goose's live repertoire (per El Goose's \"Originals\" filter) but were originally written/credited under earlier or side projects (Vasudo, Great Blue, St. John's Revival, Orebolo, Swimmer). Treated as part of the Gooseverse per user direction \u2014 Goose has folded these into their core catalog.", "songs": [{"title": "Butter Rum", "originalArtist": "Vasudo", "debut": "2018-04-06", "timesPlayed": "120", "notes": "Written by Rick Mitarotonda & Matt Campbell, originally a Vasudo song from the band's 2012 Westport, CT origins \u2014 one of several Vasudo tunes that became Goose staples (alongside Hot Tea, The Empress of Organos, Factory Fiction). In its Vasudo era, the only Goose-lineage song to regularly feature drummer Ben Atkind on backing vocals. Lyrically, the narrator addresses a nicknamed love interest through playful, warm, tropical island imagery \u2014 casting himself as a laid-back island figure and her as a passing storm that sweeps through and leaves just as quickly; a romantic-comic tension between someone steady and someone wild and fleeting, told entirely through breezy, beachy metaphor. Visual cues: a sun-drenched island bar at golden hour, a swirling tropical storm personified as a woman made of wave and wind, a relaxed, grinning island-dweller character lounging against driftwood, cocktail glasses catching warm light, playful contrast between calm tropical heat and a brief, dramatic squall. A lighthearted, romantic-comic levity piece alongside Doobie Song and Turkish Hills.", "tags": ["Pre-Goose Origin"]}, {"title": "Butterflies", "originalArtist": "Great Blue", "debut": "2022-06-10", "timesPlayed": "20", "notes": "Written by Peter Anspach (Great Blue), debuted by Goose in 2022 at Legend Valley, Thornville, OH. Great Blue \u2014 Anspach's pre-Goose project with Nick Hanna, Seth Zucker, and Ethan Michael \u2014 also originated Yeti, Time to Flee, Doc Brown, Jeff Engborg, Lily's Tiger, and Pancakes, all now part of Goose's live repertoire. **Note: no lyrics or interview on meaning found \u2014 flagged as no-content-available.**", "tags": ["Sparse", "Pre-Goose Origin"]}, {"title": "Dim Lights", "originalArtist": "Orebolo", "debut": "2024-11-10", "timesPlayed": "3", "notes": "Written by Rick Mitarotonda for Orebolo \u2014 the acoustic Goose spinoff trio (Rick, Peter Anspach, Jeff Arevalo) \u2014 later adopted into Goose's electric live repertoire. Fan reviews consistently describe it as one of the most beautiful songs in the catalogue and one of the few Orebolo-exclusive songs, often leaving audiences visibly moved; frequently paired in setlists with other tender, spiritually-toned songs like Arise, It Burns Within, and A Western Sun. **Note: no transcribed lyrics or specific interview on meaning found \u2014 flagged as thin on narrative content; visual cues below based on documented tone only.** Visual cues: a low, warm, intimate light source \u2014 a single lamp or candle rather than anything bright \u2014 a quiet room holding a private, vulnerable moment, hushed acoustic stillness rather than the more electric, jam-driven palette of most Goose songs. A tender, hushed mood piece akin to Honeybee or A Western Sun until lyrical themes can be confirmed.", "tags": ["Thin", "Pre-Goose Origin"]}, {"title": "Doc Brown", "originalArtist": "Great Blue", "debut": "2018-06-01", "timesPlayed": "47", "notes": "Written by Peter Anspach (Great Blue), debuted by Goose June 2018. Peter has said he wrote it in his basement with his Great Blue bandmates, directly inspired by the movie Back to the Future, which he grew up loving \u2014 calling the lyrics silly but the song formative for the band. Plays with time-travel and physics imagery from that film \u2014 momentum, mass, being out of sync with normal time \u2014 paired with a comic, escapist refrain. A playful tension between wanting to confront or change oneself versus accepting some things can't be undone, set against larger-than-life imagery of traveling across time and space. Visual cues: a flickering vintage screen (a literal VCR), warped clock dials and gears spinning out of sync, a comic mad-scientist figure summoned by an excited crowd, a streak of light trailing through a starry void as a stand-in for time travel, a playful, retro-pulp aesthetic. A lighthearted, nostalgic levity piece alongside Doobie Song and Butter Rum.", "tags": ["Pre-Goose Origin"]}, {"title": "(dawn)", "originalArtist": "Goose", "debut": "2022-01-26", "timesPlayed": "12", "notes": "Written by Rick Mitarotonda, off Shenanigans Nite Club (2021). Rick has described envisioning someone stepping away from a chaotic party scene and experiencing a moment of self-realization and growth. Explores personal growth, resilience, and embracing a new beginning \u2014 a journey from a low point (\"coming down with the dawn\") toward a brighter future, letting go of past burdens with a gradual transformation suggested through fire imagery (purging old habits slowly rather than all at once), paired with reassurance that things will be alright. Visual cues: a lone figure quietly slipping out a side door away from a loud, blurred party scene, dawn light breaking pale and cool over a quiet street, something smoldering and burning down slowly rather than violently, ash giving way to first green growth. A direct narrative companion to Same Old Shenanigans \u2014 if S.O.S. is the hazy night inside the club, (dawn) is the same character finally stepping outside into clarity.", "tags": ["Creature/Myth"]}, {"title": "(satellite)", "originalArtist": "Goose", "debut": "2018-06-01", "timesPlayed": "3", "notes": "An instrumental addendum on Shenanigans Nite Club (2021), tacked onto the end of \"So Ready.\" No lyrical content \u2014 functions live as a launching pad for extended jamming, growing out of unfinished jams into frenetic, intensifying lead guitar work. Visual cues: orbital/space imagery \u2014 something breaking free from gravity, drifting and accelerating through dark space, gaining momentum and intensity the further it travels from its point of origin. A pure mood/motion piece, paired conceptually with So Ready as its musical extension.", "tags": ["Instrumental"]}, {"title": "Factory Fiction", "originalArtist": "Vasudo", "debut": "2016-10-09", "timesPlayed": "29", "notes": "Written by Rick Mitarotonda & Matt Campbell, originally a Vasudo song from Rick's pre-Goose days. Rick has described it as a \"white whale\" in the band's catalog. Thematically, the narrator embraces risk and deliberate strangeness, moving through grinding industrial surroundings and accepting that things might get unsettling rather than retreating to safety \u2014 a contrast between nighttime outsiders who lean into ambiguity and daytime crowds who demand explanations and conformity. A second movement turns mythic: a weary traveler on the verge of giving up encounters a childlike figure offering quiet permission to let go and embrace the night as a kind of home. Visual cues: grinding steel machinery in a shadowy factory interior, restless nighttime figures gathering in defiance of daylight conformity, a worn traveler crossing into darkness, a small child-spirit offering guidance at a crossroads, the night personified as a sheltering home rather than something to fear. Pairs with Thatch's theme of defending strange inner instincts against outside conformity.", "tags": ["Pre-Goose Origin"]}, {"title": "Flodown", "originalArtist": "Vasudo", "debut": "2015-09-26", "timesPlayed": "167", "notes": "Written by Rick Mitarotonda, originally a Vasudo song, now one of Goose's most-played pieces. The title refers to a fictional gathering/party event; the song depicts a sweltering, restless crowd looking for release as evening falls, converging from surrounding towns for a raucous, festival-like night. A tonal shift follows as a lawman figure threatens to shut the event down, and the crowd braces defensively against that authority, determined to keep the celebration going. Visual cues: a dusk gathering of revelers streaming in from every direction toward a glowing central event, heat-shimmer and restless energy giving way to loose, chaotic celebration, a stern lawman figure looming at the edge of the crowd's joy, a unified crowd standing its ground to protect the night's revelry. A high-energy \"community defiance and celebration\" piece \u2014 pairs with Into the Myst's communal uprising energy.", "tags": ["Pre-Goose Origin"]}, {"title": "Good Times // End Times", "originalArtist": "Goose", "debut": "2026-06-20", "timesPlayed": "1", "notes": "Off BIG MODERN! (2026), never performed live until this entry. Rick has described it as sitting at the heart of a strange duality the band's been exploring \u2014 intense beauty and deep gratitude alongside real horrors, ecstasy butting against inner dread, all happening in an environment that blurs what's real from an amplified projection coming from countless other inputs. Press described it as \"an anthem for an apocalypse that never quite arrives,\" with a thick, enveloping soundscape. Album reviews note a marching beat and synth opening giving way to a melancholy chorus, including a passage where Rick recites binary code, tying back to the album's commentary on modern maximalism. Visual cues: a celebration that never quite tips into disaster, fireworks frozen mid-burst against a static-filled sky, binary code raining down like digital weather, a crowd dancing in a room where the walls flicker between festive lights and emergency red, beauty and dread sharing the same frame without resolving into either. Pairs directly with Big Modern! and Good2B as part of the album's \"joyful unease\" visual register.", "tags": ["Documented"]}, {"title": "Hot Love & The Lazy Poet", "originalArtist": "Vasudo", "debut": "2024-04-07", "timesPlayed": "38", "notes": "Written by Rick Mitarotonda & Matt Campbell \u2014 the very first Vasudo song ever written, emerging when the two were teenagers playing together in Rick's basement before Vasudo formally came together with Trevor Weekz and Jeff Arevalo. Included on Vasudo's earliest physical release, the limited-run \"French Tapes\" EP (2013). Now appears on Goose's Chain Yer Dragon (2025). **Note: no transcribed lyrics or interview on specific meaning found \u2014 flagged as no-content-available, despite the song's historical significance as the literal origin point of the Vasudo/Goose songwriting lineage.**", "tags": ["Sparse", "Pre-Goose Origin"]}, {"title": "How It Ends", "originalArtist": "Vasudo", "debut": "2024-04-10", "timesPlayed": "11", "notes": "Written by Rick Mitarotonda & Matt Campbell, originally a Vasudo song. **Note: no interview on specific meaning found \u2014 flagged as thin/uncertain.** At a general level, the song reads as a farewell/closing-statement piece tied to a life spent playing music, with a sense of clarity or peace arriving at the very end \u2014 but more specific narrative detail isn't available from a reliable source, so visual direction should be treated as provisional until confirmed.", "tags": ["Thin", "Pre-Goose Origin"]}, {"title": "Iguana Song", "originalArtist": "Goose", "debut": "2025-05-09", "timesPlayed": "15", "notes": "Written by Peter Anspach, off Everything Must Go (2025) \u2014 one of only four genuinely new songs on the album rather than a long-played live staple. Described as a quintessential Anspach composition: an immediate musical hook with dual-guitar harmonization, alongside playful and goofy lyrics, with Rick adding his own flavor in the chorus. One review noted the lyrical story wraps up in just two minutes, with the synth work carrying its own adventure that needs no lyrics to assist it. **Note: no deeper thematic interview found \u2014 flagged as thin/uncertain on narrative meaning beyond \"playful and goofy.\"** Visual cues (based on documented tone): a literal, comic iguana character rendered with personality and charm, a quick, breezy scene that doesn't overstay its welcome, bright playful colors matching the goofy lyrical content, dual-guitar-harmony visualized as two mirrored shapes moving in sync. A lighthearted character/levity piece \u2014 a good companion to Doobie Song and Butter Rum.", "tags": ["Sparse", "Thin"]}, {"title": "It Burns Within", "originalArtist": "St. John's Revival", "debut": "2014-12-20", "timesPlayed": "11", "notes": "Written by Rick Mitarotonda, originally from his early project St. John's Revival \u2014 one of two St. John's Revival songs still in circulation today (alongside \"Arise\"). Goose has performed two musically distinct live versions. A fan writeup describes it as reading on first listen like a song about heartbreak and loneliness, but ultimately about self-love \u2014 a dialogue with one's own inner child, asking to be accompanied rather than abandoned. Thematically, the narrator searches nightly for connection but finds only his own reflection, accompanied by an inner \"demon child\" figure that needles him with reason to keep going; he longs for someone to hold the key that frees him from his own self-imposed walls. A second movement imagines a quiet, shared world built for two where isolation dissolves, before returning to vulnerability and an admission that beneath the resistance, an enduring flame sustains him regardless. Visual cues: a lone figure searching city streets at night, only their own reflection visible in a window, a shadowy \"demon child\" figure perched just behind that reflection \u2014 unsettling but oddly nurturing, a locked chain around the heart with someone holding the matching key, two figures building a private moonlit world together, walls crumbling away to reveal warmth underneath. Pairs with All I Need's self-doubt imagery \u2014 a candidate for a recurring \"inner child as guide\" motif.", "tags": ["Pre-Goose Origin"]}, {"title": "Jed Stone", "originalArtist": "Vasudo", "debut": "2025-06-07", "timesPlayed": "12", "notes": "Written by Rick Mitarotonda, originally a Vasudo song predating the band's 2014 formation with Trevor Weekz. Long-anticipated by fans, Goose finally debuted it live in 2025. One field review described a moment of the song landing with particular weight during a sunset performance, tied to a lyric expressing solitary self-awareness carried through the night. **Note: no fuller interview on overall meaning found \u2014 flagged as thin/uncertain beyond this one documented emotional beat.** Visual cues (based on limited content): a lone figure under a darkening sky, aware of their own smallness against the vastness of night, quiet, solitary persistence rather than despair. Treat as a contemplative, understated mood piece until more material becomes available.", "tags": ["Thin", "Pre-Goose Origin"]}, {"title": "Jeff Engborg", "originalArtist": "Great Blue", "debut": "2022-02-05", "timesPlayed": "12", "notes": "Instrumental, originally a Great Blue song, migrated to Goose's catalog alongside Yeti, Lily's Tiger, Doc Brown, and Pancakes. Named for Jeff Engborg Jr., a real musician and longtime friend of the band from Wilton, CT (born 1987). Part of a planned \"Jeff Engborg funk trilogy\" \u2014 an \"Engborg suite\" \u2014 where themes from the first two installments re-emerge in a third, connected by the same five-note main melody as one ongoing musical saga. No lyrical content to interpret since it's instrumental and named for a real person rather than a fictional narrative \u2014 its \"meaning\" is structural/relational rather than story-driven. Visual cues: a pure groove/instrumental entry with funky, warm, communal energy befitting a song named in tribute to a real friend; a recurring five-note melodic motif could translate into a repeating visual symbol or pattern across a connected \"suite\" of scenes, mirroring the song's structure across its three planned movements.", "tags": ["Instrumental", "Pre-Goose Origin"]}, {"title": "Lily's Tiger", "originalArtist": "Great Blue", "debut": "2020-11-06", "timesPlayed": "3", "notes": "Written by Peter Anspach (Great Blue), an instrumental piece, debuted by Goose at South Farms, Morris, CT \u2014 noted for a main melody with shades of Rod Stewart's \"Do Ya Think I'm Sexy?\" Typically used as a high-energy set opener by both Great Blue and Goose. No lyrical content to interpret since it's wordless. Visual cues: a pure groove/energy piece \u2014 heat, sweat, motion, an opening-statement burst of momentum, playful and a little flashy given its disco/funk melodic lineage. No narrative to assign; useful purely as a kinetic, high-energy mood entry.", "tags": ["Instrumental", "Pre-Goose Origin"]}, {"title": "Loose Ends", "originalArtist": "Vasudo", "debut": "2019-09-01", "timesPlayed": "18", "notes": "Written by Trevor Weekz, originally a Vasudo song \u2014 notable as one of the few catalog entries written primarily by Trevor rather than Rick or Peter. A recurring live piece since its Vasudo days, now part of Goose's regular rotation. **Note: no transcribed lyrics or interview on meaning found \u2014 flagged as no-content-available.**", "tags": ["Sparse", "Pre-Goose Origin"]}, {"title": "Moby", "originalArtist": "Goose", "debut": "2021-05-08", "timesPlayed": "21", "notes": "Instrumental, off Ted Tapes 2021 \u2014 part of Goose's live improvisational compilation series recorded during rehearsals and soundchecks. Captured during Goose's appearance at Dead & Company's 2020 Playing in the Sand event at the Moon Palace, Riviera Maya, Mexico; opens the Ted Tapes 2021 release. Welcomes listeners with serene improvisational soundscapes; the official visualizer used calming imagery of jellyfish, swimmers, and aquatic activity, likely nodding to the beachfront setting of the original recording. No lyrical content since it's fully instrumental \u2014 purely atmospheric. Visual cues: a calm, oceanic dreamscape \u2014 jellyfish drifting in slow motion, sunlight filtering through clear blue-green water, swimmers gliding weightlessly, a beachfront horizon at dusk. A serene, meditative mood piece \u2014 a tranquil \"underwater interlude\" setting within the Gooseverse.", "tags": ["Instrumental"]}, {"title": "Moonrise", "originalArtist": "Orebolo", "debut": "2022-06-25", "timesPlayed": "3", "notes": "Written by Peter Anspach, off Dripfield (2022). Described as a tender acoustic number with a Simon & Garfunkel feel, inspired by Wes Anderson's \"Moonrise Kingdom\"; had not been performed live at the time of the album's release and has since remained a deeper cut, seldom played outside Orebolo or acoustic Goose sets. **Note: no deeper interview on specific narrative content found beyond its documented tone and inspiration \u2014 flagged as thin on theme specifics.** Visual cues (based on documented inspiration): a quiet, golden-hour pastoral scene, two young or youthful figures against a soft, storybook-like landscape, gentle acoustic tones translated into warm, hand-painted visual textures, a moon rising over a still, intimate setting. A tender, intimate mood piece \u2014 a quieter cousin to White Lights and Honeybee.", "tags": ["Thin", "Pre-Goose Origin"]}, {"title": "Pancakes", "originalArtist": "Great Blue", "debut": "2022-01-27", "timesPlayed": "68", "notes": "Written by Peter Anspach, originally a Great Blue song off their 2015 album Safety First. Many fans read it as a goofy party song about sharing and flipping pancakes in increasingly silly fashion, supported by the chorus alone \u2014 but the two verses introduce a darker, more introspective edge, creating a Jekyll-and-Hyde contrast with the carefree chorus. A detailed fan analysis describes the verses' music as spacey and uncomfortable, evoking circular, anxious thought with a jittery drumbeat, before snapping into an abruptly cheerful, major-key chorus. One reading frames the song as a dialogue between someone fighting internal darkness and an easygoing, party-loving crowd trying to coax him outside himself \u2014 he may be too embroiled in his own struggle to join in, making their celebration look surreal or absurd to him, like a darker version of a children's story. Visual cues: a surreal party scene with pancakes flipped off walls and eaten on ceilings in giddy, golden-lit chaos, juxtaposed against a shadowy figure standing apart lost in spiraling anxious thought, the two scenes visually bleeding into each other like an Escher composition. Pairs with Dr. Darkness (internal darkness externalized) and Hungersite (weariness vs. resilience) but through a more whimsical, children's-book lens.", "tags": ["Pre-Goose Origin"]}, {"title": "Pinche Gringo", "originalArtist": "Goose", "debut": "2015-03-14", "timesPlayed": "1", "notes": "Extremely rare \u2014 played only once, debuted and performed on the same date at Jimmy's Seaside Tavern, Stamford, CT. **Note: no lyrics, interview, or song-specific fan analysis found \u2014 flagged as no-content-available.** (Note: this is a distinct song from \"Gringo,\" already logged separately in Part 1 \u2014 the two are not the same entry despite similar titles.)", "tags": ["Sparse"]}, {"title": "POP", "originalArtist": "Goose", "debut": "2024-04-06", "timesPlayed": "1", "notes": "Played only once. **Note: no lyrics, interview, or song-specific fan analysis found \u2014 flagged as no-content-available.**", "tags": ["Sparse"]}, {"title": "Rockdale", "originalArtist": "Vasudo", "debut": "2018-08-02", "timesPlayed": "83", "notes": "Written by Rick Mitarotonda & Matt Campbell, originally a Vasudo song, now a Goose live staple (Notable Jam 18 times). Depicts a narrator heading toward a named gathering place for a night of music and release, shedding old burdens and constraints to let loose. A tension between resignation and renewal, settling old business before the night's pursuits, closing on hope as dawn approaches after the night's revelry. Visual cues: a dusty road leading toward a lit-up barroom or roadhouse at night, a figure shaking off old chains or burdens before stepping through the door, dancing bodies under low golden light, a closing image of sunrise breaking over the building as the night winds down. Pairs with Flodown as another \"gathering place\" piece \u2014 purely celebratory rather than carrying Flodown's note of external threat.", "tags": ["Pre-Goose Origin"]}, {"title": "Savenger", "originalArtist": "Goose", "debut": "2026-06-12", "timesPlayed": "5", "notes": "Written by Rick Mitarotonda & Matt Campbell, off BIG MODERN! (2026), first part of a three-song suite with \"(you are here)\" and \"((savengersspell)).\" Described as an immediate winner on first listen, with an 80s vibe \u2014 Anspach's synth tone amid heavy synth blasts matching percussion-heavy production before a searing guitar solo, evoking a wide shot of a city at night in classic 80s-thriller style. One review noted the suite is where the album turns more sinister, with the vocals taking a darker turn. **Note: no transcribed lyrics or narrative-specific interview found \u2014 flagged as thin on theme; visual cues based on documented tone/suite-context only.** Visual cues: an 80s neo-noir cityscape at dusk, electric blue and hot pink streetlight glow, a predatory, prowling energy suggested by the title itself, shifting from glossy synth-pop sheen into something more sinister and stalking as the suite progresses. Part of the same Big Modern! digital-anxiety visual cluster as the title track, Good2B, and Torero. **Note: this search also surfaced several additional Big Modern! song titles not yet logged in this codex \u2014 (you are here), ((savengersspell)), (begin), (faena), (again), ((nocturne)), MEDIA, plus Draconian Meter Maid and I'm Writing A Novel seen in recent setlists \u2014 flagging these for future research passes.**", "tags": ["Thin"]}, {"title": "Slow Ready", "originalArtist": "Goose", "debut": "2019-03-01", "timesPlayed": "102", "notes": "Written by Rick Mitarotonda, off Dripfield (2022), debuted live March 2019. One analysis describes it as ultimately about surrendering to rhythm \u2014 discarding complex narrative for the blunt honesty of physical attraction, with the lyrics receding into the groove by the instrumental break, suggesting silence and movement can tell a clearer story than any verse. Reframes the song not as pursuit but as the comfort of finally being known \u2014 the narrator allowing himself to be caught by someone he's been circling for years, rather than chasing. The slower, more seductive sibling to \"So Ready.\" Visual cues: a dimly lit gallery doorway, two figures finally locking eyes after circling each other for years, a slow-motion dance floor scene where movement replaces words, warm amber light and a sense of surrendering tension rather than active chase. A tender, slow-burn counterpart to So Ready's more upbeat, playful energy.", "tags": ["Documented"]}, {"title": "So Ready", "originalArtist": "Goose", "debut": "2015-04-18", "timesPlayed": "73", "notes": "Written by Rick Mitarotonda, off Shenanigans Nite Club (2021). Described as funky and upbeat with a danceable groove and playfulness, drawing on some of Phish's post-1996 sound influences; a standout feature is Mitarotonda's relaxed yet commanding vocal delivery. Live, the jam version typically extends into the instrumental \"(satellite),\" already logged in this codex, which directly follows it on the Shenanigans EP. Called by one writer perhaps the most straightforward and accessible of Goose's pop songs. Thematically captures a flirtatious, confident anticipation \u2014 someone fully prepared to dive into a moment of connection on a dance floor, daring the other person to stop waiting and commit to the moment; playful rather than tender, brimming with self-assured energy rather than vulnerability. Visual cues: a confident figure striding onto a glowing dance floor under colored lights, a playful, winking energy radiating outward, two people closing the distance between them with no hesitation, bright, upbeat color and motion blur suggesting momentum rather than stillness. The upbeat, confident counterpart to Slow Ready's slower surrender \u2014 together forming a complete \"approach and arrival\" pairing.", "tags": ["Documented"]}, {"title": "Tumble", "originalArtist": "Vasudo", "debut": "2012", "timesPlayed": "131", "notes": "Written by Rick Mitarotonda, originally a Vasudo song from 2012, also performed by Orebolo. One of the catalog's most jam-heavy live vehicles (Notable Jam 36 times). Uses a literal stumble or fall as a metaphor for life's setbacks \u2014 suggesting something valuable can be found by pausing where you land rather than rushing back up, and that a fall isn't necessarily bad luck but part of how you eventually get back on your feet; closes on a reassuring, forward-looking note about continuing the road ahead. Visual cues: a figure sitting on the ground after a fall, looking down at something unexpectedly meaningful discovered at ground level, a path stretching ahead waiting to be continued, a quiet, reflective pause rather than urgency to recover instantly. A grounded, philosophical piece about resilience through setbacks \u2014 pairs with Hungersite and 726 in that perseverance cluster.", "tags": ["Pre-Goose Origin"]}, {"title": "Turbulence & The Night Rays", "originalArtist": "Vasudo", "debut": "2012", "timesPlayed": "4", "notes": "Written by Rick Mitarotonda, originally a Vasudo song from 2012. Centers on a named, somewhat sinister character tied to vice and temptation, guiding listeners into a darker, rundown corner of a city where music and ritual draw people in despite danger. A traveling group encounters this figure and is swept into an exchange involving devotion, risk, and reward \u2014 giving yourself fully to something larger (via a music/performance metaphor) comes with both temptation and a dangerous, alluring permanence. A strong named antagonist/trickster character entry \u2014 Turbulence as a shadowy figure presiding over a decayed, lantern-lit district, accompanied by a mysterious ensemble (the \"Night Rays\"), luring travelers toward an enticing but morally ambiguous bargain. Visual cues: narrow alleyways lit by scattered lanterns and distant bells, ragged children and worn streets suggesting poverty and neglect, a hooded or theatrical figure at the center of attention, a crowd half-entranced and half-wary. A strong companion to Dr. Darkness and Mr. Action as a third antagonist/trickster figure rounding out the Gooseverse's rogues' gallery \u2014 more menacing and seedy than Mr. Action, closer to Dr. Darkness but with a more overtly supernatural, ritualistic flavor.", "tags": ["Character", "Pre-Goose Origin"]}, {"title": "Wysteria Lane", "originalArtist": "Vasudo", "debut": "2012", "timesPlayed": "6", "notes": "Written by Rick Mitarotonda, originally a Vasudo song from 2012. **Note: no interview or thematic analysis found beyond basic catalog stats \u2014 flagged as thin/uncertain. Visual direction should wait until more reliable source material is available.**", "tags": ["Thin", "Pre-Goose Origin"]}, {"title": "Your Direction", "originalArtist": "Goose", "debut": "2025-05-09", "timesPlayed": "16", "notes": "Off Everything Must Go (2025) \u2014 one of only four genuinely new songs on the album rather than a long-played live staple finally getting studio treatment. Described in album-level framing as a drifting, exploratory piece, contrasted with Thatch's propulsive, door-kicking energy as the more meandering counterpart. **Note: no deeper interview on specific narrative content found \u2014 flagged as thin on theme; visual cues based on documented tonal contrast only.** Visual cues: a slow, meandering path rather than a direct one, soft, drifting clouds or fog obscuring a clear destination, a figure following an uncertain compass rather than a fixed star. A companion mood piece to Thatch \u2014 the searching, undecided counterpart to that song's defiant certainty.", "tags": ["Thin"]}]}, {"title": "Part 4: BIG MODERN! (2026) \u2014 Remaining Tracklist Entries", "status": "Complete. The other 8 of 15 tracks (Big Modern!, Savenger, Good2B, Torero, SALT, Good Times // End Times, (((postplace))), POP) are already logged in Parts 1\u20133. This completes the full album.", "songs": [{"title": "(begin)", "originalArtist": "Goose", "debut": "2026-06-12", "timesPlayed": "1", "notes": "Opening track of BIG MODERN! (2026) \u2014 an instrumental prelude that builds momentum for what follows. No lyrical content since it's instrumental. Visual cues: a slow fade-in from darkness or static into focus, gathering light or sound waves coalescing into form, the visual equivalent of a held breath before a story begins. Best treated as a literal \"opening curtain\" piece for the album's visual arc.", "tags": ["Instrumental"]}, {"title": "(you are here)", "originalArtist": "Goose", "debut": "2026-06-12", "timesPlayed": "1", "notes": "A direct continuation of \"Savenger,\" using similar harmonies and lyrics while expanding on how fleeting and small life can feel \u2014 part of the album's first stretch of jam-oriented material. Visual cues: a tiny figure or marker pin placed on a vast, overwhelming map or cityscape, scale shifting disorientingly between intimate and cosmic, continuing Savenger's neo-noir visual register but zooming further out into smallness and fragility.", "tags": ["Documented"]}, {"title": "((savengersspell))", "originalArtist": "Goose", "debut": "2026-06-12", "timesPlayed": "1", "notes": "An interlude transitioning seamlessly from \"(you are here),\" arriving at a point in the album that showcases the band's musical chemistry and improvisational strengths. No fixed lyrical narrative \u2014 primarily a showcase instrumental passage. Visual cues: a spell or incantation rendered visually \u2014 circling light, layered transparent figures playing in sync, a magic-circle motif completing the \"Savenger\" suite's transformation from predatory tension into something more transcendent.", "tags": ["Instrumental", "Creature/Myth"]}, {"title": "MEDIA", "originalArtist": "Swimmer", "debut": "2026-06-12", "timesPlayed": "1", "notes": "Written by drummer Cotter Ellis, originally performed by his former band Swimmer \u2014 one of only two BIG MODERN! tracks not written by Rick Mitarotonda (the other being Peter Anspach's \"POP\"). Further develops the album's technological themes, with Anspach and Mitarotonda joining voices for one of the record's most distinctive vocal performances; its short runtime and hyper-energized sound mirror the speed and overstimulation of contemporary media consumption. Explores constant anxiety and a feeling of brain decay through mindless media consumption, delivered through a bright, punchy sound that's ironic given how dark the subject matter actually is. Visual cues: a flickering wall of competing screens and headlines, a figure's face lit only by device glow, information overload rendered as visual noise and static, bright candy-colored surfaces concealing something hollow underneath. Belongs to the Big Modern! digital-anxiety cluster alongside the title track and Good2B.", "tags": ["Pre-Goose Origin"]}, {"title": "(faena)", "originalArtist": "Goose", "debut": "2026-06-12", "timesPlayed": "1", "notes": "Track 9 on BIG MODERN!, between Torero and POP. **Note: no specific description or interview found beyond its tracklist placement and runtime \u2014 flagged as thin/uncertain.** Visual direction should wait until more material becomes available; the title (Spanish for \"task\" or, in bullfighting context, a matador's display of skill) may tie thematically to Torero immediately preceding it \u2014 worth revisiting alongside that song's bullfighting imagery.", "tags": ["Thin"]}, {"title": "(again)", "originalArtist": "Goose", "debut": "2026-06-12", "timesPlayed": "1", "notes": "An effective interlude transitioning into \"Good Times // End Times.\" No fixed lyrical narrative \u2014 a connective instrumental passage. Visual cues: a loop or repeating motif visually rhyming with the album's themes of cyclical modern life, a clock hand passing the same mark once more, a scene resetting subtly different than before.", "tags": ["Instrumental"]}, {"title": "((nocturne))", "originalArtist": "Goose", "debut": "2026-06-12", "timesPlayed": "1", "notes": "Uses strings to build an eerie atmosphere before exploding into an electrifying jam session. Visual cues: a hushed, string-laden nighttime scene that suddenly fractures into kinetic, electric motion \u2014 moonlit stillness giving way to a sudden storm of light and movement, the album's most explicit \"calm before the eruption\" visual moment, setting up the mellow descent of closing track (((postplace))).", "tags": ["Documented"]}]}, {"title": "Excluded From This Codex (Covers, Not Originals)", "status": "", "songs": [{"title": "I'm Writing A Novel", "originalArtist": "N/A (Cover)", "debut": "", "timesPlayed": "", "notes": "Father John Misty cover (confirmed via setlist notes)", "tags": ["Excluded"]}, {"title": "Draconian Meter Maid", "originalArtist": "N/A (Cover)", "debut": "", "timesPlayed": "", "notes": "appears to be a recurring cover/jam vehicle based on setlist note patterns (grouped with explicitly-marked covers like Bloodbuzz Ohio/The National, Peggy-O/Grateful Dead); not flagged anywhere as a Goose original credit", "tags": ["Excluded"]}]}]

  const BESTIARY_SEED_DATA = [{"title": "The Ridge \u2014 Guides & Guardians", "status": "Named beings tied to the High Peaks/Ridge Domain, distinct from the Keepers of the Hearth and the Wysteria Lane bestiary entries below.", "songs": [{"title": "Elmeg the Wise", "originalArtist": "Hybrid (Goose \u2014 Autumn Crossing EP)", "debut": "2016", "timesPlayed": "", "notes": "A tree spirit who dwells atop the hilltop at the Ridge \u2014 the Gooseverse's clearest guide/mentor figure, and the source of the Ritual of the Tumble taught to Seekers there. Confirmed as the completing piece of a three-part song suite released on the studio EP \"Autumn Crossing,\" alongside \"Travelers I\" and \"Travelers II.\" Per the Song Codex, the song \"Elmeg the Wise\" is itself credited to Rick Mitarotonda's pre-Goose project St. John's Revival rather than Goose proper \u2014 similar to the Yeti/Great Blue situation \u2014 though Goose has performed it live since 2016 and treats it as part of the band's core catalog via this suite. It shares lyrical lines directly with the Travelers songs, including a recurring \"voice beneath the quill,\" which suggests Elmeg functions as a guide, mentor, or quill-bearing narrator for travelers pausing at a northern shoreline before continuing south \u2014 likely the most important song-to-character thread for Elmeg in the wider mythology. Elmeg's own teaching, the Ritual of the Tumble, is the Ridge's central philosophy: losing one's balance on purpose rather than walking a fixed path, through the three steps of the Heavy Past, Controlled Surrender, and Shifting Rhythms \u2014 offered as a choice, not imposed as a rule. Visual cues: an ancient, moss- and bark-textured figure rooted into a hilltop tree line at the Ridge, weathered bark skin that reads as aged yet unmistakably alive, a quill or writing implement worked subtly into the design as a nod to the shared \"voice beneath the quill\" imagery, thin bright mountain air and wide open sky framing a still, patient presence.", "tags": ["Hybrid"]}]}, {"title": "The Keepers of the Hearth \u2014 Moon Cabin's Ancient Companions", "status": "Sourced from the Moon Cabin Bestiary field document, submitted by Previcio the Scribe. These seven gather near Moon Cabin under no ruler but the Great Moon itself. Per project decision, this Moon Cabin is now understood as the SAME entity as Previcio's inner sanctuary described in the core mythology \u2014 one concept, described from two angles: the inner experience (a state earned through stillness) and the outer mythology (a place these companions gather near, ruled by no one). See the merged Moon Cabin entry for the unified description.", "songs": [{"title": "Moss Rabbit", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Keeper of Small Wonders. Among the oldest forest spirits \u2014 fur covered in moss, lichens, tiny flowers, and mushrooms; wherever it sleeps, forgotten seeds awaken. Appears to travelers who have become lost in life, not to show the way but to remind them that paths reveal themselves slowly. Domain: Hope and Renewal. One of the four Keepers of the Hearth. Signs of its presence: circles of mushrooms, clover growing where none grew before, finding things once thought lost, dreams of green hills and moonlit streams. Gifts: renewal, patience, quiet hope. Visual cues: a small rabbit-shaped form entirely overgrown with living moss and miniature flora, faint mushroom-cap textures along its spine, a trail of tiny blooms left behind where it walks, soft green-gold lighting suggesting something ancient and gentle rather than wild.", "tags": ["Mythological Growth", "Keeper of the Hearth"]}, {"title": "Ember Fox", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Keeper of Inspiration. Runs between campfires and stars, fur glowing with embers that trail sparks through the night. Artists, musicians, and wanderers feel it nearby when inspiration strikes unexpectedly \u2014 it teaches movement and creation, stirring the ashes when one grows stagnant. Domain: Inspiration and Creativity. One of the four Keepers of the Hearth. Signs: sudden bursts of ideas, shooting stars, warm breezes on cool nights, unexplainable joy. Gifts: creativity, adventure, passion. Visual cues: a fox-shaped silhouette rendered in living embers and drifting sparks, a tail that leaves a brief trail of fading orange light, eyes like small coals, movement depicted as a streak or blur rather than a solid, static form.", "tags": ["Mythological Growth", "Keeper of the Hearth"]}, {"title": "Lantern Keeper", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Guardian of Lost Travelers. Rarely seen directly \u2014 some describe a hooded figure, others see only a lantern floating through the trees. Walks forgotten roads, helping the weary and broken find shelter, not by changing their destination but by helping them continue. Does not speak; simply walks ahead. Domain: Guidance and Mercy. One of the four Keepers of the Hearth. Signs: a distant golden light, unexpected kindness from strangers, dreams of cabins and campfires, feeling less alone. Gifts: guidance, endurance, mercy. Visual cues: a hooded, faceless silhouette barely distinguishable from shadow, a single warm lantern held low and swaying gently, the light pooling just far enough ahead to reveal the next few steps of a path and no more.", "tags": ["Mythological Growth", "Keeper of the Hearth"]}, {"title": "Cabin Witch", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Weaver of Remedies. Lives between seasons, fluent in the language of rain, mushrooms, roots, and moonlight. Collects stories in glass bottles and brews tea from memories and herbs. Though many fear her, she has never harmed anyone \u2014 she reminds travelers that healing is rarely dramatic, but slow, ordinary, and beautiful. Domain: Healing and Wisdom. One of the four Keepers of the Hearth. Signs: strange herbs growing near old cabins, ravens watching quietly, the scent of cedar and tea, feeling called to rest. Gifts: healing, wisdom, acceptance. Visual cues: a weathered woman framed by shelves of glass bottles each holding a faint glow, dried herbs and roots hanging from cabin rafters, a steaming teapot as a recurring motif, a raven perched nearby as silent witness rather than omen.", "tags": ["Mythological Growth", "Keeper of the Hearth"]}, {"title": "Moon Owl", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Keeper of Hidden Truths. Sees what others overlook; feathers resemble the night sky itself. Speaks only in dreams and appears when great questions are being asked, teaching that answers cannot be rushed. Domain: Insight and Reflection. Signs: repeated numbers, meaningful coincidences, owls calling at night, clear dreams. Gifts: insight, reflection, perspective. Visual cues: an owl whose plumage is rendered as a literal star field or night sky rather than feathers, eyes that hold a faint constellation pattern, perfectly still posture suggesting patient, unhurried observation.", "tags": ["Mythological Growth"]}, {"title": "Rain Toad", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Bringer of Rest. Sleeps beneath stones and sings with thunderstorms, arriving during periods of exhaustion and sorrow to teach that rest is sacred. Domain: Peace and Restoration. Signs: gentle rain, desire for solitude, deep sleep, memories returning. Gifts: peace, restoration, emotional release. Visual cues: a toad with skin like wet stone, faint droplets perpetually beading and rolling off its back, low grey-blue rainlight, a posture of total stillness suggesting deep, unbothered sleep even in the rain.", "tags": ["Mythological Growth"]}, {"title": "Wysteria Stag", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Guardian of the Threshold. Antlers draped with wisteria blossoms and starlight; stands where one life becomes another. Travelers encounter it during times of great change \u2014 it cannot open the gate for anyone, it merely shows that one exists. Per project decision, this entity is treated as domain-agnostic (the source document does not place it within the Seeker's Journey Domain structure, so no Wysteria Lane assignment has been imposed on it). Domain (thematic, not geographic): Transformation and Threshold-Crossing. Signs: purple flowers appearing unexpectedly, dreams of gates, feeling ready to let go. Gifts: transformation, courage, faith. Visual cues: a stag whose antlers are overgrown with trailing wisteria blossoms that seem to hold their own faint inner light, standing motionless at the edge of a threshold (a gate, a tree-line, a doorway with no walls), starlight caught in the blossoms rather than the antlers themselves.", "tags": ["Mythological Growth"]}, {"title": "Cardinal of the Dawn", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Messenger of Joy. Bright red and impossible to ignore, appearing when joy has been forgotten \u2014 its song reminds wanderers that delight is not frivolous, but nourishment. Domain: Gratitude and Celebration. Signs: unexpected laughter, music playing at just the right moment, red feathers. Gifts: gratitude, music, celebration. Visual cues: a vivid red cardinal rendered slightly larger and bolder than life, perched somewhere unexpected (a windowsill, a fence post, mid-flight against a grey sky), color saturation deliberately higher than its surroundings to make it impossible to miss.", "tags": ["Mythological Growth"]}, {"title": "The Narwhals of Hot Tea", "originalArtist": "Goose (Hot Tea, Vasudo-era)", "debut": "", "timesPlayed": "165", "notes": "Confirmed by Previcio via the vinyl album's printed lyric booklet, the most authoritative print source for the song's text. This resolves an earlier open question: some digital lyric transcriptions render the relevant line differently, but the official printed booklet confirms narwhals as the correct image. The line sits inside the song's central cluster of natural inquisition, paired directly with lightning bolts and waterfalls \u2014 the narwhals are something searched for and only occasionally found, tied to the song's questioning, chasing-satellites mood rather than to danger or threat. In the Gooseverse, the Narwhals function as elusive, half-mythic sea creatures whose presence answers (without fully resolving) the song's open inquiry \u2014 found rarely, and only by those still asking the question. Visual cues: a narwhal's single spiraled tusk breaking the surface of dark, glassy water at night, glimpsed only in silhouette against starlight or the glow of a struck match, more felt than seen \u2014 an answer that confirms itself without fully arriving. Pairs naturally with the song's other elemental imagery (lightning, waterfalls) in the Elemental Phenomena codex; tracked here as a creature entry since the narwhal itself is a living being, not a force.", "tags": ["Song-rooted"]}]}, {"title": "The Wildlands & Wysteria Lane Bestiary", "status": "Confirmed creatures from the core Seeker's Journey mythology (gooseverse_mythology_v2.md), Section 2.", "songs": [{"title": "The Yeti", "originalArtist": "Goose (credited to Great Blue)", "debut": "2018-10-26", "timesPlayed": "120", "notes": "Primal Manifestation. Important divergence, noted honestly: the actual song \"Yeti\" is a satirical consumerism piece from Peter Anspach's pre-Goose project Great Blue \u2014 not creature mythology in its source material. The Gooseverse's Yeti is built independently of the song's real subject: a massive, shaggy primal guardian whose eyes glow with Silver Rising moonlight, manifesting the traveler's fear of self-erasure. Countermeasure: the Diamond Eye \u2014 wholeness repels the beast. Visual cues: a towering, shaggy-furred guardian looming at a forest's edge, eyes lit with cold silver-blue moonlight rather than warmth, a presence that grows more visible the more a traveler doubts themselves.", "tags": ["Divergent"]}, {"title": "Spirit of the Dark Horse", "originalArtist": "Goose", "debut": "2014-11-26", "timesPlayed": "36", "notes": "Phantom Messenger. An ethereal stallion of midnight smoke and stardust, hooves sparking violet static. A spectral force sometimes wielded by Dr. Darkness to haunt pilgrims and test resolve, but originally a guardian entity tied to a ritual fireside scene \u2014 older than the conflict it's now used in. Generally recognized as the first Goose song ever written. Visual cues: a horse-shaped form composed of drifting smoke and stardust rather than solid matter, hooves leaving brief violet sparks where they strike ground, equally at home as a protector by firelight or a haunting presence in the dark, depending on who is wielding its appearance.", "tags": ["Song-rooted"]}, {"title": "The Iguana & His Brother", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "The Detached Observer and the Maze. The Iguana sits on a sun-warmed rock on a sheepskin, skin hardening into scales \u2014 a seeker who successfully transfigured once but became stagnant, offering cryptic warnings to those still moving. His brother is mischief embodied in the Labyrinth itself, leading Seekers toward false paths. Together they represent the danger of stopping for the wrong reasons, after the Tumble's discipline of motion has already been learned. NAMING NOTE (unresolved, kept separate per project decision): a different source describes the Labyrinth's living structure itself as \"the Labyrinth's Brother\" \u2014 a distinct image from the trickster figure described here. These remain tracked as separate entities until deliberately merged or split. Visual cues: a sun-warmed iguana with skin visibly hardening into permanent scale on an old sheepskin rug, eyes that watch without urgency, a second, shiftier presence nearby (the brother) whose exact form blurs at the edges, leading paths that double back on themselves.", "tags": ["Mythological Growth", "Unresolved naming"]}, {"title": "The Labyrinth", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "The Living Organism. Not a maze of stone but a biological structure \u2014 walls of living rib, corridors forming a digestive tract. Seekers don't get lost in the Labyrinth; they walk through something alive. Governed by the Three Laws of the Labyrinth: the Law of the Tumble (every ending is a new beginning), the Law of the Drip (identity must be liquefied to survive the Dripfield's heat), and the Law of the Frequency (rhythm is the only objective truth). Some source material personifies this structure as \"the Labyrinth's Brother\" \u2014 see naming note under the Iguana entry above; this remains a description of the maze itself, not a confirmed third character. Visual cues: corridors formed from living rib-bone, walls that flex and pulse faintly as though breathing, a path that resembles a digestive tract more than a corridor, an unsettling sense of being inside a body rather than a structure.", "tags": ["Mythological Growth", "Unresolved naming"]}, {"title": "Barnaby \u2014 The Moon Manchild", "originalArtist": "Hybrid (tied to \"Show Upon Time\", confirmed by Goosemas XII)", "debut": "", "timesPlayed": "", "notes": "A lone figure who strayed from the path into Lovering's Hollow on a night ruled by the Beaver Moon, encountering a Phantom Willow that bleeds violet, bioluminescent sap. Substantially confirmed by Goose's own \"Barnaby Glimpse's Show Upon Time\" theatrical narrative (Goosemas XII, December 2025) \u2014 Barnaby Glimpse is an officially-developed Goose character, a boy lost in Lovering's Hollow in the 1730s who resurfaces a century later as a carnival-host figure. The video's own atmosphere gives this entry a concrete sensory anchor: a cold, still scene with the moon overhead and frost on the ground, sky and ground bracketing the moment he disappeared. Barnaby is the cautionary figure of the Wildlands: the seeker who stopped moving with the shifting rhythms and became a permanent echo within the Labyrinth's walls instead. Where the Iguana chose stillness, Barnaby was trapped by it. Visual cues: a child-like figure frozen mid-step at the edge of Lovering's Hollow, a willow nearby weeping thick violet, faintly glowing sap, a pale moon overhead with frost settled on the ground below, casting long, motionless shadows around him.", "tags": ["Hybrid"]}]}, {"title": "The Organos Grid, Rockdale & Open Bestiary Categories", "status": "Confirmed entities plus named-but-unfilled design slots \u2014 these are open creature categories with no specific entities assigned yet, carried over honestly from field-guide visual planning rather than invented to fill the gap.", "songs": [{"title": "The Empress of Organos", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "The Binary Tyrant. A towering monolith of cold brass, obsidian glass, and motherboard circuitry \u2014 a Clockwork Gorgon. Rules through cold logic and media saturation, attempting to lock up bad thoughts and force the world's rhythm into a static, repeating loop. Her domain is the Uncanny Valley, an \"em dash oasis\" where identity dilutes through hyper-connectivity. Countermeasure: Shifting Rhythms and Jive I \u2014 dancing through the static until her grid begins to rust. Visual cues: a humanoid monolith fused from brass plating, obsidian glass panels, and exposed motherboard circuitry, a gaze that reads as both regal and mechanically cold, wires trailing from her like hair or a crown rather than ornamentation.", "tags": ["Mythological Growth"]}, {"title": "Silver Rising \u2014 The Transfiguration", "originalArtist": "Goose", "debut": "2022-02-02", "timesPlayed": "66", "notes": "Not merely a lunar phase but a cosmic trigger for biological crisis. Under its light, the \"Who am I?\" psychological struggle becomes physically real: humans dissolve into Humanoid Beasts, dreams swallowed by night as they embrace the wild animal within. The same mechanism that threatens Previcio and his fellow Travelers when Moon Cabin's glow dims. The progression: human form \u2192 biological crisis \u2192 primal beast form. Those who maintain their Diamond Eye resist full transfiguration. Visual cues: a figure mid-transformation under full moonlight, silver-blue light catching fur or fangs emerging rather than warm tones, a standoff moment frozen between human composure and feral release.", "tags": ["Song-rooted"]}, {"title": "The Red Bird", "originalArtist": "Hybrid", "debut": "2022-01-29", "timesPlayed": "55", "notes": "The Herald of Completion. An incandescent avian beast with feathers forged from breaking dawn, wings shedding liquid embers. Its flight signals the closing of the Hungersite \u2014 the soul's burning ego and endless craving to be more. When the Red Bird flies, the Hungersite is finally satiated. Visual cues: a bird whose feathers look forged rather than grown, dawn-colored plumage that sheds small trailing embers in flight, a sense of release and finality in its movement rather than urgency.", "tags": ["Hybrid"]}, {"title": "[Open Category] Ancient Creatures", "originalArtist": "Design slot", "debut": "", "timesPlayed": "", "notes": "Named as an open bestiary category in field-guide visual planning, with no specific entities assigned yet. This is a design slot, not yet lore \u2014 held here honestly as empty rather than filled with invented placeholder content. Future creatures fitting an \"ancient/primordial\" register belong here once defined.", "tags": ["Open Slot"]}, {"title": "[Open Category] Clockwork Beasts", "originalArtist": "Design slot", "debut": "", "timesPlayed": "", "notes": "Named as an open bestiary category in field-guide visual planning, with no specific entities assigned yet. This is a design slot, not yet lore. Likely thematic home for future Organos Grid-adjacent mechanical creatures, distinct from the Empress herself. Future creatures fitting a \"synthetic/mechanical\" register belong here once defined.", "tags": ["Open Slot"]}]}];
  const ELEMENTS_SEED_DATA = [{"title": "Water, Storm & Sky", "status": "Sourced from confirmed song imagery across the catalog.", "songs": [{"title": "Lightning Bolts", "originalArtist": "Goose (Hot Tea, Vasudo-era)", "debut": "", "timesPlayed": "165", "notes": "From \"Hot Tea\": part of a recurring image-cluster of natural inquisition \u2014 lightning bolts and waterfalls, paired with the question of \"where all the night walls go.\" In the Gooseverse, lightning functions as a moment of sudden, electric clarity \u2014 a flash that briefly reveals what the dark normally hides, rather than a destructive force. Pairs naturally with the Empress of Organos's circuitry imagery as a contrast: organic electricity vs. synthetic current. Visual cues: a single bright fork of lightning illuminating a night landscape for a frozen instant, brief silver-white afterimages burned into a dark sky, the implied sound of distant thunder rendered as visual ripple rather than noise.", "tags": ["Song-rooted"]}, {"title": "Waterfalls", "originalArtist": "Goose (Hot Tea, Vasudo-era)", "debut": "", "timesPlayed": "165", "notes": "From \"Hot Tea\": paired directly with lightning bolts in the song's central image of natural inquisition. In the Gooseverse, waterfalls represent a constant, cleansing release \u2014 water that has already decided where it's going, unlike the Dripfield's slower, heavier liquid-desert imagery. A visual counterpoint to the Dripfield's molten heat: where the Dripfield melts identity slowly, a waterfall washes it away quickly and completely. Visual cues: a tall, continuous fall of water catching available light (moonlight, dawn, or storm-light), mist gathering at its base, a sense of motion that never pauses or hesitates.", "tags": ["Song-rooted"]}, {"title": "This Old Sea", "originalArtist": "Goose", "debut": "2014-12-20", "timesPlayed": "39", "notes": "From \"This Old Sea\": the sea as a place to bury twisted, tired thoughts and carry away a loved one's burdens. The narrator watches the sun set repeatedly over the water, offering to carry every trouble to the bottom of this ancient sea. In the Gooseverse, this sea functions as a parental, comforting body of water \u2014 distinct from the Dripfield's trial-by-fire and distinct from the Coastal Town's departure-point sea. Visual cues: a sun setting again and again over endless dark water, a gentle hand submerging a burden beneath the surface, a horizon where sea and sky blur together rather than meet at a hard line.", "tags": ["Song-rooted"]}, {"title": "Turned Clouds", "originalArtist": "Goose", "debut": "2014-11-21", "timesPlayed": "116", "notes": "From \"Turned Clouds\": storm clouds slowly turning and clearing rather than darkening further \u2014 the song's central hope-amid-adversity image, and the literal sky Elizabeth watches from the Coastal Town in the core mythology. Closes on a river current carrying a figure gently downstream toward the sea. Visual cues: clouds caught mid-turn, neither fully stormy nor fully clear, a soft directional light suggesting change already underway, a slow river current visualized as a path rather than a hazard.", "tags": ["Song-rooted"]}]}, {"title": "Fire & Blood", "status": "Sourced from confirmed song imagery, primarily \"Creatures\" and \"Silver Rising.\"", "songs": [{"title": "Fire on the Beach", "originalArtist": "Goose (Creatures)", "debut": "2015-10-01", "timesPlayed": "144", "notes": "From \"Creatures\": a fire on a beach drawing nocturnal figures toward it, part of the song's broader nighttime mythic-animal imagery (bark-marking creatures, water-gliding bodies, rain on a lake, a prowling lion, a moth circling flame, a phoenix rising). In the Gooseverse, beach-fire functions as a gathering point \u2014 warmth and light pulling scattered figures into one circle against the dark, echoing Spirit of the Dark Horse's fireside-ritual origin scene. Visual cues: a contained fire on open sand at night, silhouetted figures drawn toward it from different directions, firelight catching on wet sand and retreating tide-foam at the fire's edge.", "tags": ["Song-rooted"]}, {"title": "Blood on the Horizon", "originalArtist": "Goose (Animal)", "debut": "2022-06-11", "timesPlayed": "79", "notes": "From \"Animal\": part of the song's tense jungle backdrop \u2014 blood on the horizon, eyes on high ground, something breathing close by \u2014 set against a celebration of primal embodiment and movement over overthinking. In the Gooseverse, this functions as an ambient warning-sign of danger at the edge of perception rather than violence depicted directly \u2014 the sense that something is near, not a graphic event. Visual cues: a faint red wash low on a jungle horizon line, suggestive rather than explicit, tall grass and canopy shadow doing more visual work than the color itself.", "tags": ["Song-rooted"]}, {"title": "Silver Blood / Cold Transformation", "originalArtist": "Goose (Silver Rising)", "debut": "2022-02-02", "timesPlayed": "66", "notes": "From \"Silver Rising\": the catalog's clearest werewolf/transformation song. Per the song's own visual register, blood and adrenaline are rendered in cold silver-blue tones rather than warm red \u2014 wild glowing eyes, fur or fangs catching moonlight. This is a deliberate Gooseverse departure from typical horror-color blood imagery, keeping the transformation eerie and lunar rather than gory. Visual cues: silver-blue toned highlights standing in for blood/adrenaline intensity, moonlight as the dominant light source even in close-up, a standoff moment where danger reads as cold and inevitable rather than violent.", "tags": ["Song-rooted"]}, {"title": "The Phoenix (from Creatures)", "originalArtist": "Goose (Creatures)", "debut": "2015-10-01", "timesPlayed": "144", "notes": "From \"Creatures\": a phoenix mid-transformation appears in the song's second movement alongside a prowling lion, a tiger, and a moth circling flame \u2014 each tied to a small lesson about urgency, presence, and not waiting. The phoenix specifically carries the transformation/renewal lesson. Distinct from Silver Rising's cold lunar transformation \u2014 phoenix-fire is warm, cyclical, and chosen rather than triggered. Visual cues: a bird mid-combustion and mid-rebirth simultaneously, warm orange/gold fire that consumes without destroying, ash falling away to reveal new feathers already forming underneath.", "tags": ["Song-rooted"]}]}, {"title": "Moon, Heat & Liquid Desert", "status": "Sourced from confirmed song imagery and core mythology Domain descriptions (Dripfield, Silver Rising).", "songs": [{"title": "The Dripfield Heat", "originalArtist": "Goose (Madhuvan / Dripfield)", "debut": "", "timesPlayed": "", "notes": "The Liquid Desert, crucible of ego-death \u2014 intense spiritual heat where ego is meant to melt rather than harden. Governed by the Labyrinth's Law of the Drip: identity must be liquefied, creating a cooling effect on the spirit that allows a Seeker to survive the Dripfield's intensity by shedding the weight of physical history. Distinct from Hot Tea's waterfalls (quick release) \u2014 Dripfield heat is slow, total, and transformative rather than cleansing. Visual cues: rippling heat-haze over molten-looking dunes, a figure's outline beginning to blur and run like wax at the edges, ground that seems to shimmer between solid and liquid.", "tags": ["Mythological Growth"]}, {"title": "Hot Tea and Butter Rum (The Ritual)", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "The alchemical lubricants of the Dripfield, credited in-universe to the \"Night Rays\" band \u2014 consumed to vibrate the spirit between human, beast, and spirit states, stripping away physical history and easing the Seeker toward transformation. Visual cues: two steaming vessels (a teacup and a small dark bottle) passed between Travelers around a low fire, steam that curls upward in slightly unnatural, deliberate spirals, a faint shimmer in the liquid itself suggesting it's more than a simple drink.", "tags": ["Mythological Growth"]}, {"title": "Moonlight (Diamond Eye state)", "originalArtist": "Mythological Growth", "debut": "", "timesPlayed": "", "notes": "Moonlight in the Gooseverse carries two opposite charges depending on context. Under Silver Rising, it triggers transfiguration into Humanoid Beasts. Held through the Diamond Eye (the centered, whole state from Coordinate 726), it instead becomes a shield \u2014 the same light that destabilizes an unguarded Traveler clarifies and protects a centered one. Visual cues: identical pale-silver moonlight rendered two ways depending on the subject's state \u2014 fractured and sharp-edged on someone losing their center, soft and steady on someone holding the Diamond Eye.", "tags": ["Mythological Growth"]}, {"title": "Heat Haze / 726", "originalArtist": "Goose", "debut": "2020-06-20", "timesPlayed": "40", "notes": "From \"726\": shimmering heat haze rising off pavement, a recurring sense of isolation and quiet resolve to keep moving despite exhaustion. Directly tied to the Celestial Coordinate 726 in the core mythology \u2014 the Temporal Rift/internal Lighthouse stabilizing in \"cold water\" even at the journey's furthest point. Visual cues: visible heat-shimmer distorting a horizon line, a lone figure wading through standing water as relief that stays just out of reach, a quiet, gritty resolve rendered through posture rather than expression.", "tags": ["Song-rooted"]}]}];
